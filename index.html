<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f0f0e">
<title>FocusBlock</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════ RESET & TOKENS ════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
:root{
  --bg:#0f0f0e;--bg2:#181816;--bg3:#222220;--bg4:#2c2c29;
  --accent:#c8f060;--at:#0c0e06;
  --text:#f0ede6;--muted:#6b6862;--mid:#9a9790;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.05);
  --glow:rgba(200,240,96,0.13);
  --r-sm:12px;--r-md:18px;--r-lg:24px;--r-xl:28px;
  --shadow:0 8px 40px rgba(0,0,0,0.4);
  --ff:'Geist',-apple-system,BlinkMacSystemFont,sans-serif;
  --fs:'Instrument Serif',Georgia,serif;
  --fm:'DM Mono',ui-monospace,monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-t:env(safe-area-inset-top,0px);
}
/* THEMES */
body.t-rose{--accent:#fb7185;--at:#130408;--glow:rgba(251,113,133,0.15);}
body.t-violet{--accent:#c084fc;--at:#0c0614;--glow:rgba(192,132,252,0.15);}
body.t-sky{--accent:#67e8f9;--at:#031014;--glow:rgba(103,232,249,0.13);}
body.t-amber{--accent:#fcd34d;--at:#100c01;--glow:rgba(252,211,77,0.13);}
body.t-sage{--accent:#6ee7b7;--at:#03100b;--glow:rgba(110,231,183,0.13);}
body.t-warm{--bg:#14110d;--bg2:#1d1812;--bg3:#272016;--bg4:#322a1e;--accent:#f0a868;--at:#140a02;--text:#f2ebe0;--glow:rgba(240,168,104,0.13);}
/* LIGHT THEME */
body.lt{--bg:#f4f1ea;--bg2:#fbf9f4;--bg3:#ece8df;--bg4:#e2ddd2;--text:#1a1814;--muted:#8a857a;--mid:#56524a;--border:rgba(0,0,0,0.09);--border2:rgba(0,0,0,0.05);--accent:#5b7a1f;--at:#f4f1ea;--glow:rgba(91,122,31,0.12);--shadow:0 8px 40px rgba(0,0,0,0.1);}
body.lt.t-rose{--accent:#c14358;--at:#fff;--glow:rgba(193,67,88,0.12);}
body.lt.t-violet{--accent:#8b4fd6;--at:#fff;--glow:rgba(139,79,214,0.12);}
body.lt.t-sky{--accent:#1f7d92;--at:#fff;--glow:rgba(31,125,146,0.12);}
body.lt.t-amber{--accent:#b07d12;--at:#fff;--glow:rgba(176,125,18,0.12);}
body.lt.t-sage{--accent:#1f8a5f;--at:#fff;--glow:rgba(31,138,95,0.12);}
body.lt.t-warm{--bg:#f7f0e6;--bg2:#fdf8ef;--bg3:#efe5d6;--accent:#b56a28;--at:#fff;}
/* PHASE COLOR MODES — strong, glanceable shifts so you can SEE the switch from across the room.
   Focus keeps your chosen theme accent. Breaks override accent + bg + glow entirely. */
body.ph-short{
  --bg:#0b1512;--bg2:#0f1c17;--bg3:#16271f;
  --accent:#34d399;--at:#04130d;--glow:rgba(52,211,153,.35);--mid:#5fb89a;
}
body.ph-long{
  --bg:#0c0f1d;--bg2:#111527;--bg3:#191e36;
  --accent:#818cf8;--at:#0a0c1c;--glow:rgba(129,140,248,.38);--mid:#8b93c9;
}
body.lt.ph-short{
  --bg:#e7f6ef;--bg2:#f3fbf7;--bg3:#dcefe5;
  --accent:#0f9d6b;--at:#fff;--glow:rgba(16,157,107,.25);--mid:#4f8d75;
}
body.lt.ph-long{
  --bg:#eaecfb;--bg2:#f5f6fd;--bg3:#e0e3f7;
  --accent:#5b63d6;--at:#fff;--glow:rgba(91,99,214,.25);--mid:#6a70b8;
}
/* smooth the whole-page transition between phases */
body{transition:background-color .8s ease;}
.phase-flag{display:inline-flex;align-items:center;gap:7px;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:6px 14px;border-radius:99px;background:var(--accent);color:var(--at);transition:background .6s,color .6s;}
.phase-flag .pf-dot{width:7px;height:7px;border-radius:50%;background:var(--at);opacity:.85;}
body.ph-short .phase-flag,body.ph-long .phase-flag{animation:flagpop .6s ease;}
@keyframes flagpop{0%{transform:scale(.85);}60%{transform:scale(1.06);}100%{transform:scale(1);}}

body{font-family:var(--ff);background:var(--bg);color:var(--text);transition:background .8s ease,color .6s ease;overflow:hidden;-webkit-font-smoothing:antialiased;}
body.scrollable{overflow:auto;}

/* atmospheric bg */
#atmos{position:fixed;inset:0;z-index:-2;pointer-events:none;background:
  radial-gradient(ellipse 80% 50% at 50% -10%,var(--glow),transparent 60%),
  radial-gradient(ellipse 60% 40% at 90% 110%,var(--glow),transparent 55%);
  opacity:.6;transition:opacity .8s;}
#bgPhoto{position:fixed;inset:0;z-index:-1;background-size:cover;background-position:center;display:none;filter:blur(8px);transform:scale(1.06);}
body.has-bg #bgPhoto{display:block;}
body.has-bg #bgPhoto::after{content:"";position:absolute;inset:0;background:var(--bg);opacity:.62;}
body.has-bg{--text:#fff;--muted:rgba(255,255,255,.62);--mid:rgba(255,255,255,.82);--border:rgba(255,255,255,.18);--bg2:rgba(20,20,20,.55);--bg3:rgba(40,40,40,.5);}
body.has-bg.lt{--text:#111;--muted:rgba(0,0,0,.6);--mid:rgba(0,0,0,.78);--border:rgba(0,0,0,.16);--bg2:rgba(255,255,255,.55);--bg3:rgba(255,255,255,.4);}

::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px;}
::-webkit-scrollbar-track{background:transparent;}

.screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:1;transition:opacity .45s ease;}
.screen.out{opacity:0;pointer-events:none;display:none;}
button{font-family:var(--ff);cursor:pointer;}
input,textarea,select{font-family:var(--ff);}

/* ════════════════ SHARED ════════════════ */
.logo{font-size:11px;font-weight:700;letter-spacing:.26em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;}
.logo-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent);}
.btn-primary{background:var(--accent);border:none;color:var(--at);padding:15px 30px;border-radius:99px;font-size:14px;font-weight:700;letter-spacing:.04em;cursor:pointer;transition:transform .2s,box-shadow .2s,opacity .2s;box-shadow:0 6px 26px var(--glow);display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:48px;}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 34px var(--glow);}
.btn-primary:active{transform:translateY(0);}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);padding:13px 24px;border-radius:99px;font-size:13px;font-weight:600;transition:all .2s;min-height:46px;display:inline-flex;align-items:center;justify-content:center;gap:7px;}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.fade-in{animation:fadeUp .5s ease both;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* ════════════════ START / HOME SCREEN ════════════════ */
#home{overflow-y:auto;}
.home-wrap{min-height:100%;display:flex;flex-direction:column;padding:max(2rem,var(--safe-t)) 2rem 2rem;max-width:1100px;margin:0 auto;width:100%;}
.home-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:auto;}
.home-top-actions{display:flex;gap:8px;align-items:center;}
.home-hero{padding:3rem 0 2.5rem;}
.home-greet{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem;}
.home-title{font-family:var(--fs);font-size:clamp(36px,6vw,68px);line-height:1.04;color:var(--text);margin-bottom:1.1rem;}
.home-title em{font-style:italic;color:var(--accent);}
.home-sub{font-size:16px;color:var(--mid);line-height:1.7;max-width:520px;}
.home-streak{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:7px 15px;font-size:13px;font-weight:600;cursor:pointer;transition:border-color .2s;}
.home-streak:hover{border-color:var(--accent);}
.cards{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin-bottom:auto;}
.start-card{position:relative;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:1.6rem;cursor:pointer;transition:transform .25s,border-color .25s,box-shadow .25s;overflow:hidden;text-align:left;display:flex;flex-direction:column;gap:.5rem;min-height:160px;}
.start-card::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 100% 0%,var(--glow),transparent 65%);opacity:0;transition:opacity .3s;}
.start-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:var(--shadow);}
.start-card:hover::after{opacity:1;}
.start-card.primary{background:linear-gradient(150deg,var(--bg3),var(--bg2));border-color:var(--border);}
.sc-icon{font-size:26px;line-height:1;}
.sc-icon svg{width:30px;height:30px;}
.sc-title{font-size:19px;font-weight:700;color:var(--text);letter-spacing:-.01em;}
.sc-desc{font-size:13.5px;color:var(--muted);line-height:1.55;flex:1;}
.sc-tag{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.start-card.disabled{opacity:.5;pointer-events:none;}
.home-foot{margin-top:2rem;display:flex;flex-wrap:wrap;gap:8px;align-items:center;justify-content:center;}
.home-foot-note{font-size:11.5px;color:var(--muted);text-align:center;width:100%;line-height:1.6;margin-top:.4rem;}
/* empty state */
.home-empty{grid-column:1/-1;text-align:center;padding:2rem 1.5rem;display:flex;flex-direction:column;align-items:center;gap:.8rem;}
.he-icon{font-size:40px;line-height:1;}
.he-title{font-size:18px;font-weight:700;color:var(--text);}
.he-desc{font-size:14px;color:var(--muted);line-height:1.65;max-width:320px;}
.he-desc em{color:var(--accent);font-style:normal;font-weight:600;}
/* utility */
.hidden{display:none!important;}

/* ════════════════ TOP BUTTONS ════════════════ */
.icon-btn{background:var(--bg2);border:1px solid var(--border);color:var(--mid);width:46px;height:46px;border-radius:13px;font-size:21px;line-height:1;display:inline-flex;align-items:center;justify-content:center;transition:all .2s;}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);}
.icon-btn svg{width:21px;height:21px;}

/* ════════════════ FLOW (onboarding / planners) ════════════════ */
#flow{overflow-y:auto;}
.flow-wrap{min-height:100%;max-width:620px;margin:0 auto;width:100%;padding:max(1.5rem,var(--safe-t)) 1.5rem calc(2rem + var(--safe-b));display:flex;flex-direction:column;}
.flow-head{display:flex;align-items:center;justify-content:space-between;padding:.5rem 0 1.5rem;position:sticky;top:0;z-index:5;background:var(--bg);}
.flow-back{background:none;border:none;color:var(--muted);font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:color .2s;}
.flow-back:hover{color:var(--text);}
.flow-prog{display:flex;gap:5px;flex:1;max-width:200px;margin:0 1rem;}
.fp{height:3px;flex:1;background:var(--bg3);border-radius:99px;transition:background .4s;}
.fp.act{background:var(--accent);opacity:.5;}.fp.don{background:var(--accent);}
.flow-step-lbl{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);white-space:nowrap;}
.fstep{display:none;flex-direction:column;gap:1.5rem;flex:1;}
.fstep.show{display:flex;animation:fadeUp .4s ease both;}
.fstep-q{font-family:var(--fs);font-size:clamp(26px,4.5vw,38px);color:var(--text);line-height:1.18;}
.fstep-q span{color:var(--accent);font-style:italic;}
.fstep-hint{font-size:14px;color:var(--muted);line-height:1.65;margin-top:-.8rem;}
.flow-cta{margin-top:auto;padding-top:1.5rem;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

.txt-input{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:16px 18px;font-size:18px;font-weight:600;color:var(--text);outline:none;transition:border-color .2s;width:100%;}
.txt-input:focus{border-color:var(--accent);}
.txt-input::placeholder{color:var(--muted);font-weight:400;}

/* option lists */
.opt-list{display:flex;flex-direction:column;gap:10px;}
.opt{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .2s;text-align:left;width:100%;min-height:56px;}
.opt:hover{border-color:var(--accent);}
.opt.on{border-color:var(--accent);background:var(--bg3);}
.opt-check{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--at);flex-shrink:0;transition:all .2s;}
.opt.on .opt-check{background:var(--accent);border-color:var(--accent);}
.opt-body{flex:1;}
.opt-name{font-size:15px;font-weight:600;color:var(--text);}
.opt-desc{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.5;}

/* duration cards */
.dur-grid{display:flex;flex-direction:column;gap:10px;}
.dur-opt.st-custom .dur-badge{font-size:18px;}
.st-cust-panel{display:none;flex-direction:column;gap:14px;margin-top:14px;padding:18px;background:var(--bg2);border:1.5px solid var(--accent);border-radius:var(--r-md);animation:fadeUp .3s ease both;}
.st-cust-panel.open{display:flex;}
.st-cust-row{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
.st-cust-step{display:flex;align-items:center;gap:12px;}
.st-cust-step .step-val{font-family:var(--fm);font-size:24px;color:var(--accent);min-width:62px;text-align:center;display:flex;align-items:baseline;justify-content:center;gap:3px;}
.st-cust-u{font-size:12px;color:var(--muted);font-weight:600;}
.st-cust-total{text-align:center;font-family:var(--fm);font-size:15px;color:var(--text);font-weight:500;}
.dur-opt{display:flex;align-items:flex-start;gap:14px;padding:15px 16px;border-radius:var(--r-sm);border:1.5px solid var(--border);background:var(--bg2);cursor:pointer;transition:all .2s;}
.dur-opt:hover{border-color:var(--accent);}
.dur-opt.on{border-color:var(--accent);background:var(--bg3);}
.dur-opt.rec{position:relative;}
.dur-opt.rec::before{content:attr(data-rec);position:absolute;top:-9px;right:14px;background:var(--accent);color:var(--at);font-size:9px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:3px 8px;border-radius:99px;}
.dur-badge{font-family:var(--fm);font-size:15px;color:var(--text);min-width:64px;text-align:center;padding:9px 0;border-radius:9px;background:var(--bg3);flex-shrink:0;transition:all .2s;}
.dur-opt.on .dur-badge{background:var(--accent);color:var(--at);}
.dur-txt{flex:1;}
.dur-name{font-size:14px;font-weight:600;color:var(--text);}
.dur-tag{font-size:10.5px;font-weight:600;letter-spacing:.03em;text-transform:uppercase;color:var(--accent);margin-top:3px;}
.dur-desc{font-size:12px;color:var(--muted);margin-top:5px;line-height:1.55;}
.dur-check{width:20px;height:20px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--at);flex-shrink:0;margin-top:3px;transition:all .2s;}
.dur-opt.on .dur-check{background:var(--accent);border-color:var(--accent);}

/* count stepper */
.sf-prio-list{display:flex;flex-direction:column;gap:10px;}
.sf-prio-row{display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r-sm);transition:border-color .2s;}
.sf-prio-row:first-child{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.sf-prio-handle{color:var(--muted);font-size:14px;cursor:grab;flex-shrink:0;}
.sf-prio-name{flex:1;font-size:14px;font-weight:600;color:var(--text);}
.sf-prio-badge{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap;}
.sf-prio-arrows{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
.sf-arrow{background:var(--bg3);border:1px solid var(--border);color:var(--mid);width:26px;height:22px;border-radius:5px;font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sf-arrow:hover:not(:disabled){border-color:var(--accent);color:var(--accent);}
.sf-arrow:disabled{opacity:.25;cursor:default;}
.cnt-pick{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.cnt-num{font-family:var(--fm);font-size:80px;font-weight:300;color:var(--accent);line-height:1;min-width:110px;text-align:center;}
.cnt-ctrls{display:flex;gap:10px;}
.cnt-btn{width:48px;height:48px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:24px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.cnt-btn:hover{background:var(--accent);color:var(--at);border-color:var(--accent);}
.cnt-info{font-size:14px;color:var(--muted);line-height:1.6;}
.cnt-info strong{color:var(--text);font-weight:600;}

/* subject manager (defining subjects) */
.subj-mgr{display:flex;flex-direction:column;gap:10px;}
.subj-add-row{display:flex;gap:8px;}
.subj-add-row .txt-input{flex:1;font-size:15px;padding:13px 16px;}
.subj-add-btn{background:var(--accent);border:none;color:var(--at);border-radius:var(--r-sm);width:52px;font-size:24px;flex-shrink:0;transition:opacity .2s;}
.subj-add-btn:hover{opacity:.9;}
.subj-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:.3rem;}
.subj-chip{display:inline-flex;align-items:center;gap:8px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:8px 8px 8px 14px;font-size:13px;font-weight:600;color:var(--text);}
.subj-chip .sc-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.subj-chip .sc-x{background:var(--bg3);border:none;color:var(--muted);width:22px;height:22px;border-radius:50%;font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.subj-chip .sc-x:hover{background:#f87171;color:#fff;}
.subj-chip .sc-name:hover{color:var(--accent)!important;border-bottom-color:var(--accent)!important;}
.subj-empty{font-size:13px;color:var(--muted);font-style:italic;padding:.4rem 0;}

/* per-block builder (plan my day) */
.block-builder{display:flex;flex-direction:column;gap:0;max-height:46vh;overflow-y:auto;padding-right:4px;}
.bb-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);padding:13px;display:flex;flex-direction:column;gap:10px;transition:border-color .2s,opacity .2s,box-shadow .2s;margin-bottom:10px;}
.bb-card:focus-within{border-color:var(--accent);}
.bb-card.dragging{opacity:.35;box-shadow:0 8px 32px rgba(0,0,0,.45);transform:scale(.98);}
.bb-card.drag-over{border-color:transparent!important;box-shadow:none!important;}
/* touch drag ghost */
.touch-drag-ghost{position:fixed;pointer-events:none;z-index:9999;opacity:.85;transform:scale(1.03);box-shadow:0 12px 40px rgba(0,0,0,.5);border-radius:var(--r-sm);background:var(--bg3);border:1.5px solid var(--accent);transition:none;}
.bb-drop-line{height:3px;border-radius:99px;background:var(--accent);margin:2px 0;box-shadow:0 0 10px var(--accent);animation:droplinepop .15s ease;pointer-events:none;flex-shrink:0;}
@keyframes droplinepop{from{transform:scaleX(.6);opacity:0;}to{transform:scaleX(1);opacity:1;}}
/* ring flash on phase complete */
@keyframes ringFlash{
  0%{filter:drop-shadow(0 0 0px var(--accent));opacity:1;}
  30%{filter:drop-shadow(0 0 22px var(--accent));opacity:.85;transform:scale(1.045);}
  60%{filter:drop-shadow(0 0 14px var(--accent));opacity:1;transform:scale(1.02);}
  100%{filter:drop-shadow(0 0 0px var(--accent));opacity:1;transform:scale(1);}
}
.ring-wrap.flash{animation:ringFlash .8s cubic-bezier(.22,1,.36,1) both;}
.bb-drag-handle{display:flex;align-items:center;justify-content:center;width:28px;height:28px;color:var(--muted);cursor:grab;flex-shrink:0;font-size:14px;border-radius:6px;transition:color .15s,background .15s;}
.bb-drag-handle:hover{color:var(--text);background:var(--bg3);}
.bb-drag-handle:active{cursor:grabbing;}
/* session list drag */
.block-item{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden;transition:all .2s;margin-bottom:8px;}
.block-item.dragging{opacity:.35;box-shadow:0 8px 32px rgba(0,0,0,.45);}
.block-item.drag-over{border-color:transparent!important;box-shadow:none!important;}
.bi-del-quick{background:none;border:none;color:var(--muted);font-size:14px;padding:4px 8px;border-radius:6px;transition:all .15s;flex-shrink:0;margin-left:auto;}
.bi-del-quick:hover{background:rgba(239,68,68,.15);color:#ef4444;}
.quick-add-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);padding:0 1rem .3rem;}
.quick-add-row{display:flex;gap:6px;padding:.1rem 1rem .4rem;flex-wrap:wrap;}
.quick-add-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);font-size:11.5px;font-weight:600;padding:5px 11px;border-radius:99px;transition:all .18s;white-space:nowrap;min-height:36px;}
@media(max-width:600px){.quick-add-btn{min-height:44px;padding:10px 16px;font-size:13px;}}
.quick-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.quick-add-btn.pause{border-color:rgba(129,140,248,.4);color:rgba(129,140,248,.8);}
.quick-add-btn.pause:hover{border-color:#818cf8;color:#818cf8;}
.bi-drag:hover{color:var(--accent);}
.bi-drag:active{cursor:grabbing;}
.extend-btns{display:flex;gap:8px;justify-content:center;margin-top:-.4rem;}
.extend-btn{background:none;border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:600;padding:4px 12px;border-radius:99px;transition:all .18s;}
.extend-btn:hover{border-color:var(--accent);color:var(--accent);}
#extendBtns{display:none;}
body.running #extendBtns{display:flex;}
.pause-suggest{display:flex;align-items:center;gap:8px;padding:9px 12px;background:rgba(129,140,248,.1);border:1px solid rgba(129,140,248,.3);border-radius:var(--r-sm);margin:.5rem 1rem;font-size:12px;color:var(--text);}
.pause-suggest span{flex:1;}
.pause-suggest button{background:none;border:1px solid rgba(129,140,248,.4);color:rgba(129,140,248,.9);font-size:11px;font-weight:600;padding:4px 10px;border-radius:6px;white-space:nowrap;}
.pause-suggest button:last-child{border:none;color:var(--muted);}
.bb-top{display:flex;align-items:center;gap:10px;}
.bb-num{width:24px;height:24px;border-radius:50%;background:var(--accent);color:var(--at);font-size:11px;font-weight:700;font-family:var(--fm);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bb-select{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:9px;padding:10px 12px;font-size:13.5px;font-weight:600;outline:none;}
.bb-x{background:none;border:none;color:var(--muted);font-size:18px;width:28px;transition:color .2s;}
.bb-x:hover{color:#f87171;}
.bb-min{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.bb-min input{width:60px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-family:var(--fm);font-size:13px;outline:none;text-align:center;}
.bb-note-toggle{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;transition:color .2s;}
.bb-note-toggle:hover{color:var(--accent);}
.bb-note{display:none;}
.bb-note.open{display:block;}
.bb-note textarea{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12.5px;border-radius:8px;padding:9px 11px;outline:none;resize:none;min-height:48px;line-height:1.5;}
.bb-checks{display:flex;flex-direction:column;gap:5px;}
.bb-check-row{display:flex;gap:7px;}
.bb-check-row input{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:12px;border-radius:7px;padding:7px 10px;outline:none;}
.bb-quick-row{display:flex;gap:8px;margin-bottom:12px;}
.bb-quick-btn{flex:1;background:var(--bg2);border:1.5px solid var(--border);color:var(--muted);font-size:12.5px;font-weight:700;padding:9px 8px;border-radius:10px;transition:all .18s;text-align:center;}
.bb-quick-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}
.bb-quick-pause{border-color:rgba(129,140,248,.35);color:rgba(129,140,248,.8);}
.bb-quick-pause:hover{border-color:#818cf8!important;color:#818cf8!important;background:rgba(129,140,248,.08)!important;}
.bb-add-task{background:none;border:1px dashed var(--border);color:var(--muted);font-size:11.5px;font-weight:600;padding:7px;border-radius:7px;transition:all .2s;}
.bb-add-task:hover{border-color:var(--accent);color:var(--accent);}
.bb-subj-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px;}
.bb-subj-chip{background:var(--bg3);border:1.5px solid var(--border);color:var(--muted);padding:5px 11px;border-radius:99px;font-size:12px;font-weight:600;transition:all .18s;cursor:pointer;white-space:nowrap;}
.bb-subj-chip:hover{border-color:var(--accent);color:var(--text);}
.bb-subj-chip.on{background:var(--accent);border-color:var(--accent);color:var(--at);}
.bb-subj-new{border-style:dashed;}
.bb-custom-inp{width:100%;background:var(--bg3);border:1.5px solid var(--accent);color:var(--text);border-radius:8px;padding:8px 12px;font-size:13px;font-family:var(--ff);outline:none;transition:border-color .2s;}
.bb-custom-inp.hidden{display:none;}
.bb-tasks-header{display:flex;align-items:center;justify-content:space-between;}
.bb-tasks-lbl{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.bb-add-task-inline{background:none;border:none;color:var(--accent);font-size:11.5px;font-weight:700;padding:2px 6px;border-radius:6px;transition:all .2s;opacity:.8;}
.bb-add-task-inline:hover{opacity:1;background:var(--bg3);}
.bb-add-todo-btn{background:none;border:1px dashed var(--border);color:var(--muted);font-size:12px;font-weight:600;padding:6px 10px;border-radius:8px;transition:all .2s;text-align:left;width:fit-content;}
.bb-add-todo-btn:hover{border-color:var(--accent);color:var(--accent);}
/* pause block in builder */
.bb-card.bb-pause{background:rgba(129,140,248,0.07);border-color:rgba(129,140,248,0.35);}
.bb-card.bb-pause .bb-num{background:#818cf8;color:#0a0c1c;}
.bb-card.bb-pause .bb-pause-lbl{font-size:12px;font-weight:600;color:#818cf8;flex:1;padding-left:4px;}
.bb-pause-mins{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted);}
.bb-pause-mins input{width:60px;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-family:var(--fm);font-size:13px;outline:none;text-align:center;}
.bb-add-pause{background:none;border:1px dashed rgba(129,140,248,0.4);color:rgba(129,140,248,0.8);font-size:11.5px;font-weight:600;padding:7px;border-radius:7px;transition:all .2s;}
.bb-add-pause:hover{border-color:#818cf8;color:#818cf8;}
.bb-done-by{font-size:11px;color:var(--muted);margin-top:2px;font-style:italic;}
/* start time input */
.assign-starttime{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-sm);margin-bottom:10px;}
.assign-starttime label{font-size:12px;color:var(--muted);font-weight:600;white-space:nowrap;}
.assign-starttime input[type=time]{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:7px 10px;font-family:var(--fm);font-size:13px;outline:none;color-scheme:dark;}
body.lt .assign-starttime input[type=time]{color-scheme:light;}
/* pause block in right-col list */
.block-item.pause-block{border-color:rgba(129,140,248,0.35);background:rgba(129,140,248,0.06);}
.block-item.pause-block .bi-num{background:#818cf8;color:#0a0c1c;font-size:13px;}
.block-item.pause-block .bi-name{color:#818cf8;}

/* theme & companion picker grids */
.pick-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px;}
.pick-card{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r-sm);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;transition:all .2s;text-align:center;}
.pick-card:hover{border-color:var(--accent);}
.pick-card.on{border-color:var(--accent);background:var(--bg3);}
.pick-card .pc-vis{width:46px;height:46px;display:flex;align-items:center;justify-content:center;}
.pick-card .pc-vis svg{width:100%;height:100%;}
.pick-card .pc-name{font-size:11.5px;font-weight:600;color:var(--text);}
.pick-card .pc-sub{font-size:10px;color:var(--muted);line-height:1.4;}
.theme-sw{width:34px;height:34px;border-radius:50%;border:2.5px solid transparent;transition:all .2s;}
.pick-card.on .theme-sw{border-color:var(--text);}

/* ready / summary card */
.ready-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.3rem 1.5rem;}
.rc-row{display:flex;align-items:center;gap:13px;padding:11px 0;border-bottom:1px solid var(--border);}
.rc-row:first-child{padding-top:0;}.rc-row:last-child{border-bottom:none;padding-bottom:0;}
.rc-ico{width:32px;height:32px;border-radius:9px;background:var(--accent);color:var(--at);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;}
.rc-lbl{font-size:10.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
.rc-val{font-size:14px;font-weight:600;color:var(--text);margin-top:1px;}

/* ════════════════ FOCUS APP ════════════════ */
#app{overflow:hidden;}
.app-topbar{display:flex;align-items:center;justify-content:space-between;padding:max(.7rem,var(--safe-t)) 1.5rem .7rem;border-bottom:1px solid var(--border);flex-shrink:0;position:relative;}
.app-topbar .tb-left{display:flex;align-items:center;gap:14px;}
.btn-plan-day{background:transparent;border:1px solid var(--border);color:var(--muted);padding:7px 14px;border-radius:99px;font-size:12px;font-weight:700;letter-spacing:.04em;transition:all .2s;white-space:nowrap;}
.btn-plan-day:hover{border-color:var(--accent);color:var(--accent);background:var(--glow);}
.app-topbar .tb-right{display:flex;gap:8px;align-items:center;}
.tb-streak{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:6px 13px;font-size:12px;font-weight:600;color:var(--text);transition:border-color .2s;}
.tb-streak:hover{border-color:var(--accent);}
.app-body{flex:1;display:grid;grid-template-columns:1fr 320px;min-height:0;overflow:hidden;transition:grid-template-columns .35s ease;}
.app-body.collapsed{grid-template-columns:1fr 0px;}
.left-col{display:flex;flex-direction:column;overflow:hidden;min-width:0;}

.day-bar{padding:.7rem 1.75rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1.2rem;flex-shrink:0;}
.db-blocks{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.db-block{width:24px;height:5px;border-radius:99px;background:var(--bg3);transition:all .4s;}
.db-block.done{background:var(--accent);}
.db-block.cur{background:var(--accent);opacity:.45;}
.db-info{font-size:12px;color:var(--muted);font-weight:500;}
.db-info strong{color:var(--text);font-weight:600;}
.db-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.collapse-btn{background:var(--bg2);border:1px solid var(--border);color:var(--muted);width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all .2s;}
.collapse-btn:hover{border-color:var(--accent);color:var(--accent);}

.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.1rem;padding:1.5rem 2rem;overflow-y:auto;text-align:center;}
.phase-tabs{display:flex;gap:6px;}
.ptab{padding:8px 18px;border-radius:99px;border:1px solid var(--border);font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);background:transparent;transition:all .2s;min-height:38px;}
.ptab:hover{border-color:var(--accent);color:var(--accent);}
.ptab.on{background:var(--accent);border-color:var(--accent);color:var(--at);}
.mission{max-width:480px;}
.mission-lbl{font-size:11px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:.5rem;}
.mission-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:blink 2.2s infinite;}
.mission-lbl.as-flag{background:var(--accent);color:var(--at);padding:7px 16px;border-radius:99px;margin:0 auto .7rem;width:fit-content;animation:flagpop .6s ease;transition:background .6s,color .6s;}
.mission-lbl.as-flag .mission-dot{background:var(--at);}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
.mission-name{font-size:24px;font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1.2;}
.mission-note{font-size:13.5px;color:var(--mid);margin-top:.4rem;line-height:1.5;}
.stage-wrap{flex:1;display:flex;align-items:stretch;justify-content:center;position:relative;overflow:hidden;}
.task-side-panel{position:absolute;left:1.2rem;top:50%;transform:translateY(-50%);width:170px;display:flex;flex-direction:column;gap:7px;z-index:2;pointer-events:auto;}
.task-side-panel:empty{display:none;}
.tsp-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:2px;}
.tsp-item{display:flex;align-items:flex-start;gap:8px;padding:7px 10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;text-align:left;width:100%;}
.tsp-item:hover{border-color:var(--accent);}
.tsp-item.tsp-done{opacity:.45;}
.tsp-item.tsp-done .tsp-text{text-decoration:line-through;}
.tsp-check{width:16px;height:16px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--at);flex-shrink:0;margin-top:1px;transition:all .2s;}
.tsp-item.tsp-done .tsp-check{background:var(--accent);border-color:var(--accent);}
.tsp-text{font-size:11.5px;font-weight:500;color:var(--text);line-height:1.4;}
/* session progress motivator */
.session-progress-wrap{width:100%;max-width:300px;margin:.6rem auto 0;}
.sp-track{height:5px;background:var(--bg3);border-radius:99px;overflow:visible;position:relative;}
.sp-fill{height:100%;border-radius:99px;background:var(--accent);transition:width .6s cubic-bezier(.16,1,.3,1);box-shadow:0 0 8px var(--glow);}
.sp-dots{display:flex;justify-content:space-between;margin-top:6px;}
.sp-dot{width:8px;height:8px;border-radius:50%;background:var(--bg3);border:1.5px solid var(--border);transition:all .4s;flex-shrink:0;}
.sp-dot.done{background:var(--accent);border-color:var(--accent);}
.sp-dot.cur{background:var(--accent);border-color:var(--accent);box-shadow:0 0 8px var(--accent);transform:scale(1.3);}
@media(max-width:1000px){.task-side-panel{display:none!important;}}
.mt-item{display:flex;align-items:center;gap:10px;padding:7px 11px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:all .2s;text-align:left;}
.mt-item:hover{border-color:var(--accent);}
.mt-item.mt-done{opacity:.5;}
.mt-item.mt-done .mt-text{text-decoration:line-through;color:var(--muted);}
.mt-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--at);flex-shrink:0;transition:all .2s;}
.mt-item.mt-done .mt-check{background:var(--accent);border-color:var(--accent);}
.mt-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.4;}
.motiv{font-family:var(--fs);font-size:clamp(16px,2vw,21px);font-style:italic;color:var(--accent);min-height:26px;opacity:0;transition:opacity .5s;}
.motiv.show{opacity:.92;}

.ring-wrap{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin:.3rem 0;}
.ring-svg{position:absolute;top:0;left:0;width:100%;height:100%;transform:rotate(-90deg);}
.ring-bg{stroke:var(--bg3);transition:stroke .7s;}
.ring-fg{stroke:var(--accent);stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .5s;}
.ring-inner{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
.t-time{font-family:var(--fm);font-weight:300;letter-spacing:-.02em;color:var(--text);line-height:1;user-select:none;}
.t-sub{font-size:13px;font-weight:500;color:var(--mid);max-width:200px;}
@keyframes nearpulse{0%,100%{opacity:1;}50%{opacity:.5;}}
.near-end .t-time{animation:nearpulse 1.1s infinite;color:var(--accent);}
.companion-stage{height:70px;display:flex;align-items:center;justify-content:center;}
.companion-stage svg{height:100%;width:auto;}

.minimal-time{display:none;font-family:var(--fm);font-weight:200;color:var(--text);line-height:1;font-size:clamp(64px,16vw,128px);letter-spacing:-.03em;}
.card-layout{display:none;}
/* timer layout switching (set on #app) */
#app.lay-minimal .ring-wrap{display:none;}
#app.lay-minimal .minimal-time{display:block;}
#app.lay-card .ring-wrap{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-lg);padding:2rem 2.4rem;box-shadow:0 12px 40px rgba(0,0,0,.18);}
#app.near-end .t-time,#app.near-end .minimal-time{color:var(--accent);}

.ends-pill{display:inline-flex;align-items:center;gap:9px;background:var(--bg2);border:1px solid var(--border);border-radius:99px;padding:8px 18px;}
.ep-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.ep-val{font-family:var(--fm);font-size:14px;font-weight:500;color:var(--accent);}
.ep-note{font-size:9.5px;color:var(--muted);font-weight:600;letter-spacing:.04em;text-transform:uppercase;}

.controls{display:flex;align-items:center;gap:14px;}
.play-btn{background:var(--accent);border:none;color:var(--at);border-radius:50%;width:68px;height:68px;font-size:24px;display:flex;align-items:center;justify-content:center;transition:transform .2s,box-shadow .2s;box-shadow:0 6px 30px var(--glow);position:relative;flex-shrink:0;}
.play-btn:hover{transform:scale(1.07);}
.play-btn:active{transform:scale(.93);}
.play-btn.idle::after{content:"";position:absolute;inset:-5px;border-radius:50%;border:2px solid var(--accent);opacity:.4;animation:ripple 2.2s infinite;}
@keyframes ripple{0%{transform:scale(1);opacity:.4;}100%{transform:scale(1.35);opacity:0;}}
.ctrl-btn{background:var(--bg3);border:1px solid var(--border);color:var(--mid);border-radius:11px;font-size:12px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;padding:13px 18px;min-height:46px;transition:all .2s;}
.ctrl-btn:hover{border-color:var(--accent);color:var(--accent);}

/* RIGHT COLUMN (planning) */
.right-col{border-left:1px solid var(--border);display:flex;flex-direction:column;background:var(--bg2);overflow:hidden;}
.app-body.collapsed .right-col{border-left:none;}
.rc-head{padding:1.1rem 1.3rem .8rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.rc-head-title{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.rc-endtime{font-size:11px;font-weight:600;color:var(--mid);display:flex;align-items:center;gap:5px;margin-left:auto;margin-right:.5rem;}
.rc-endtime-val{font-family:var(--fm);color:var(--accent);font-size:12px;}
.rc-endtime svg{width:12px;height:12px;opacity:.6;}
.blocks-list{flex:1;overflow-y:auto;padding:0 1rem 1rem;display:flex;flex-direction:column;gap:0;}
.block-item.cur{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.block-item.done{opacity:.6;}
.bi-head{display:flex;align-items:center;gap:10px;padding:11px 13px;}
.bi-num{width:24px;height:24px;border-radius:7px;background:var(--bg3);color:var(--mid);font-size:11px;font-weight:700;font-family:var(--fm);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .3s;}
.block-item.done .bi-num{background:var(--accent);color:var(--at);}
.block-item.cur .bi-num{background:var(--accent);color:var(--at);}
.bi-body{flex:1;min-width:0;}
.bi-name{font-size:13.5px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bi-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.bi-moves{display:flex;flex-direction:column;gap:2px;}
.bi-move{background:var(--bg3);border:1px solid var(--border);color:var(--muted);width:24px;height:18px;border-radius:5px;font-size:9px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.bi-move:hover{border-color:var(--accent);color:var(--accent);}
.bi-edit{display:none;flex-direction:column;gap:8px;padding:0 13px 12px;}
.bi-edit.open{display:flex;}
.bi-edit input,.bi-edit select,.bi-edit textarea{background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:9px 11px;font-size:12.5px;outline:none;width:100%;font-family:var(--ff);}
.bi-edit textarea{resize:none;min-height:42px;line-height:1.5;}
.bi-tasklist{display:flex;flex-direction:column;gap:4px;}
.bi-task{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text);padding:3px 0;}
.bi-task input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex-shrink:0;}
.bi-task.checked span{text-decoration:line-through;color:var(--muted);}
.rc-foot{padding:.9rem 1.1rem calc(.9rem + var(--safe-b));border-top:1px solid var(--border);flex-shrink:0;}
.add-block-btn{width:100%;background:var(--bg3);border:1px dashed var(--border);color:var(--muted);font-size:12.5px;font-weight:600;padding:11px;border-radius:var(--r-sm);transition:all .2s;}
.add-block-btn:hover{border-color:var(--accent);color:var(--accent);}
.rc-build{display:flex;align-items:center;gap:10px;width:100%;margin-top:10px;padding:10px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--r-sm);transition:all .2s;text-align:left;}
.rc-build:hover{border-color:var(--accent);background:var(--bg3);}
.rc-build-mini{width:26px;height:26px;flex-shrink:0;border-radius:7px;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.rc-build-mini svg{width:100%;height:100%;}
.rc-build-txt{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;}
.rc-build-stage{font-size:11px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rc-build-bar{height:5px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.rc-build-fill{display:block;height:100%;background:var(--accent);border-radius:99px;transition:width .8s ease;}
.rc-build-pct{font-family:var(--fm);font-size:11px;color:var(--muted);flex-shrink:0;}

/* mobile planning toggle (hidden on desktop) */
.mob-plan-btn{display:none;}
.mob-bar{display:none;}

/* ════════════════ FULLSCREEN FOCUS MODE ════════════════ */
body.zen .app-topbar,body.zen .day-bar,body.zen .phase-tabs,body.zen .ends-pill{display:none!important;}
body.zen .app-body{grid-template-columns:1fr;}
body.zen .right-col{display:none!important;}
body.zen .stage{justify-content:center;gap:1.6rem;}
body.zen .zen-exit{display:flex;}
.zen-exit{display:none;position:fixed;top:max(1rem,var(--safe-t));right:1rem;z-index:50;}
/* zen session strip — bottom center */
.zen-nextup{display:none;}
body.zen .zen-nextup{display:none;}
.zen-strip{display:none;position:fixed;bottom:max(1.4rem,var(--safe-b));left:50%;transform:translateX(-50%);z-index:50;align-items:center;gap:6px;padding:10px 16px;background:rgba(0,0,0,.45);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:99px;max-width:90vw;overflow:hidden;}
body.zen .zen-strip{display:flex;}
.zs-block{display:flex;align-items:center;gap:6px;padding:5px 10px;border-radius:99px;transition:all .3s;white-space:nowrap;}
.zs-block.zs-done{opacity:.35;}
.zs-block.zs-cur{background:var(--accent);padding:5px 14px;}
.zs-block.zs-next{opacity:.7;}
.zs-block.zs-future{opacity:.3;}
.zs-dot{width:7px;height:7px;border-radius:50%;background:var(--accent);flex-shrink:0;}
.zs-block.zs-done .zs-dot{background:var(--mid);}
.zs-block.zs-cur .zs-dot{background:var(--at);}
.zs-block.zs-pause .zs-dot{background:rgba(129,140,248,.8);}
.zs-label{font-size:11.5px;font-weight:700;letter-spacing:.02em;color:var(--text);}
.zs-block.zs-cur .zs-label{color:var(--at);}
.zs-block.zs-done .zs-label{color:var(--muted);}
.zs-mins{font-size:10px;font-weight:600;color:var(--muted);margin-left:2px;}
.zs-block.zs-cur .zs-mins{color:var(--at);opacity:.75;}
.zs-sep{width:1px;height:14px;background:var(--border);flex-shrink:0;margin:0 2px;}

/* ════════════════ MODALS ════════════════ */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:1.5rem;opacity:0;pointer-events:none;transition:opacity .3s;z-index:100;}
.modal-ov.open{opacity:1;pointer-events:auto;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-xl);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);transform:translateY(20px) scale(.98);transition:transform .3s;}
.modal-ov.open .modal{transform:translateY(0) scale(1);}
.modal-lg{max-width:760px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:1.4rem 1.6rem;position:sticky;top:0;background:var(--bg2);border-bottom:1px solid var(--border);z-index:2;}
.set-foot{position:sticky;bottom:0;display:flex;gap:10px;padding:1rem 1.6rem calc(1rem + var(--safe-b));background:var(--bg2);border-top:1px solid var(--border);z-index:3;}
.set-save{flex:1;background:var(--accent);border:none;color:var(--at);padding:14px;border-radius:99px;font-size:14px;font-weight:700;transition:opacity .2s,transform .1s;min-height:50px;}
.set-save:hover{opacity:.92;}.set-save:active{transform:scale(.98);}
.set-save:disabled{opacity:.45;cursor:default;}
.set-cancel{flex:0 0 auto;background:transparent;border:1px solid var(--border);color:var(--muted);padding:14px 22px;border-radius:99px;font-size:13.5px;font-weight:600;transition:all .2s;min-height:50px;}
.set-cancel:hover{color:var(--text);border-color:var(--mid);}
.modal-title{font-family:var(--fs);font-size:24px;color:var(--text);}
.modal-x{background:var(--bg3);border:none;color:var(--mid);width:34px;height:34px;border-radius:9px;font-size:16px;transition:all .2s;}
.modal-x:hover{color:var(--text);}
.modal-body{padding:1.5rem 1.6rem;}

/* settings tabs */
.set-tabs{display:flex;gap:4px;padding:0 1.6rem;border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:69px;background:var(--bg2);z-index:2;scrollbar-width:none;-ms-overflow-style:none;}
.set-tabs::-webkit-scrollbar{display:none;}
.set-tab{background:none;border:none;color:var(--muted);font-size:12.5px;font-weight:600;padding:13px 12px;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;flex-shrink:0;}
.set-tab:hover{color:var(--text);}
.set-tab.on{color:var(--accent);border-bottom-color:var(--accent);}
.set-pane{display:none;animation:fadeUp .3s ease both;}
.set-pane.on{display:block;}
.set-sec{margin-bottom:1.6rem;}
.set-sec-t{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:.8rem;}
.set-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--border2);}
.set-row:last-child{border-bottom:none;}
.set-row-info{flex:1;min-width:0;}
.set-row-lbl{font-size:14px;font-weight:600;color:var(--text);}
.set-row-sub{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.5;}
.stepper{display:flex;align-items:center;gap:10px;flex-shrink:0;}
.step-btn{width:34px;height:34px;border-radius:9px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.step-btn:hover{background:var(--accent);color:var(--at);}
.step-val{font-family:var(--fm);font-size:16px;color:var(--accent);min-width:42px;text-align:center;}
.toggle{width:46px;height:26px;border-radius:99px;background:var(--bg3);border:1px solid var(--border);position:relative;transition:all .2s;flex-shrink:0;}
.toggle::after{content:"";position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:var(--mid);transition:all .25s;}
.toggle.on{background:var(--accent);border-color:var(--accent);}
.toggle.on::after{left:22px;background:var(--at);}
.seg{display:flex;gap:4px;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:3px;flex-wrap:wrap;}
.seg-btn{background:none;border:none;color:var(--muted);font-size:12px;font-weight:600;padding:8px 13px;border-radius:7px;transition:all .2s;}
.seg-btn.on{background:var(--accent);color:var(--at);}
.set-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:9px;margin-top:.4rem;}
.set-langs{display:flex;flex-direction:column;gap:8px;}

/* confirm / pause modal */
.confirm-modal{max-width:440px;text-align:center;padding:2.2rem 2rem;}
.cf-icon{font-size:40px;margin-bottom:1rem;}
.cf-title{font-family:var(--fs);font-size:27px;color:var(--text);margin-bottom:.7rem;line-height:1.2;}
.cf-msg{font-size:14.5px;color:var(--mid);line-height:1.65;margin-bottom:1.6rem;}
.cf-btns{display:flex;gap:10px;flex-direction:column;}
.cf-stay{background:var(--accent);border:none;color:var(--at);padding:15px;border-radius:99px;font-size:14px;font-weight:700;transition:opacity .2s;min-height:50px;}
.cf-stay:hover{opacity:.9;}
.cf-quit{background:transparent;border:1px solid var(--border);color:var(--muted);padding:14px;border-radius:99px;font-size:13.5px;font-weight:600;transition:all .2s;min-height:48px;}
.cf-quit:hover{border-color:#f87171;color:#f87171;}

/* reward card */
.reward{text-align:center;}
.reward-cheer{font-family:var(--fs);font-size:32px;color:var(--accent);margin-bottom:.3rem;}
.reward-sub{font-size:14px;color:var(--muted);margin-bottom:1.5rem;line-height:1.5;}
.reward-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:1.4rem;}
.reward-stat{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:15px 8px;}
.reward-v{font-family:var(--fm);font-size:22px;color:var(--accent);line-height:1;}
.reward-l{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:6px;}
.reward-build{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);padding:1rem;margin-bottom:1.4rem;}
.reward-build-bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:.6rem;}
.reward-build-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 1s ease;}
.reflect-chips{display:flex;gap:8px;justify-content:center;margin-bottom:1.4rem;flex-wrap:wrap;}
.reflect-chip{background:var(--bg3);border:1px solid var(--border);color:var(--mid);border-radius:99px;padding:9px 16px;font-size:12.5px;font-weight:600;transition:all .2s;}
.reflect-chip:hover{border-color:var(--accent);}
.reflect-chip.on{background:var(--accent);border-color:var(--accent);color:var(--at);}

/* ════════════════ PROGRESS PAGE ════════════════ */
#progress{overflow-y:auto;}
.prog-wrap{max-width:880px;margin:0 auto;width:100%;padding:max(1.5rem,var(--safe-t)) 1.5rem calc(2rem + var(--safe-b));}
.prog-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;padding-top:.5rem;}
.prog-section{margin-bottom:2.4rem;}
.prog-sec-t{font-family:var(--fs);font-size:22px;color:var(--text);margin-bottom:1rem;}
.lifetime-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1rem;}
.lt-stat{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.2rem;text-align:center;}
.lt-v{font-family:var(--fm);font-size:30px;color:var(--accent);line-height:1;}
.lt-l{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--muted);margin-top:8px;}
.week-chart{display:flex;gap:8px;align-items:flex-end;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.3rem;}
.wc-day{flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;gap:7px;}
.wc-bar-wrap{height:90px;width:100%;background:var(--bg3);border-radius:8px;display:flex;flex-direction:column-reverse;overflow:hidden;}
.wc-bar{background:var(--accent);border-radius:8px 8px 0 0;min-height:3px;transition:height .7s ease;}
.wc-lbl{font-size:10px;font-weight:600;text-transform:uppercase;color:var(--muted);}
.wc-val{font-family:var(--fm);font-size:11px;color:var(--text);}
/* subject bars */
.subj-stats{display:flex;flex-direction:column;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.4rem 1.5rem;}
.ss-row{display:flex;flex-direction:column;gap:7px;}
.ss-top{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.ss-name{display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;color:var(--text);}
.ss-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ss-right{display:flex;align-items:center;gap:10px;}
.ss-pct{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.04em;}
.ss-val{font-family:var(--fm);font-size:13px;font-weight:500;color:var(--accent);min-width:52px;text-align:right;}
.ss-val-empty{color:var(--muted);font-family:var(--ff);}
.ss-track{height:6px;background:var(--bg3);border-radius:99px;overflow:hidden;}
.ss-fill{height:100%;border-radius:99px;transition:width .9s cubic-bezier(.16,1,.3,1);}
.ss-empty{font-size:13px;color:var(--muted);font-style:italic;text-align:center;padding:1rem;}
.ss-total{margin-top:6px;padding-top:12px;border-top:1px solid var(--border2);font-size:12.5px;color:var(--muted);text-align:right;}.ss-total strong{color:var(--text);font-weight:600;}
/* study village */
.village-card{background:linear-gradient(165deg,var(--bg3),var(--bg2));border:1px solid var(--border);border-radius:var(--r-lg);padding:1.5rem;overflow:hidden;}
.village-scene{width:100%;height:230px;border-radius:var(--r-md);overflow:hidden;background:var(--bg);position:relative;}
.village-scene svg{width:100%;height:100%;display:block;}
.village-info{display:flex;align-items:center;justify-content:space-between;margin-top:1.1rem;gap:1rem;flex-wrap:wrap;}
.village-stage-name{font-size:17px;font-weight:700;color:var(--text);}
.village-next{font-size:12.5px;color:var(--muted);margin-top:3px;}
.village-next b{color:var(--accent);}
.village-prog{flex:1;min-width:160px;}
.village-bar{height:8px;background:var(--bg);border-radius:99px;overflow:hidden;margin-top:6px;}
.village-fill{height:100%;background:var(--accent);border-radius:99px;transition:width 1s;}
.companion-prog{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:1.4rem;display:flex;align-items:center;gap:1.3rem;}
.cp-vis{width:90px;height:90px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.cp-vis svg{width:100%;height:100%;}
.cp-info{flex:1;}
.cp-name{font-size:18px;font-weight:700;color:var(--text);}
.cp-stat{font-size:13px;color:var(--muted);margin-top:4px;line-height:1.6;}

/* ════════════════ MOBILE-FIRST ════════════════ */
@media(max-width:820px){
  .cards{grid-template-columns:1fr;}
  .home-hero{padding:2rem 0 1.8rem;}
  .app-body{grid-template-columns:1fr;}
  /* hide desktop side planning, use bottom sheet */
  .right-col{position:fixed;left:0;right:0;bottom:0;top:auto;max-height:78vh;border-left:none;border-top:1px solid var(--border);border-radius:var(--r-xl) var(--r-xl) 0 0;transform:translateY(110%);transition:transform .35s cubic-bezier(.4,0,.2,1);z-index:60;box-shadow:0 -10px 40px rgba(0,0,0,.4);}
  .right-col.open{transform:translateY(0);}
  .app-body.collapsed{grid-template-columns:1fr;}
  .collapse-btn{display:none;}
  .rc-head{padding-top:1.3rem;}
  .rc-head::before{content:"";position:absolute;top:8px;left:50%;transform:translateX(-50%);width:40px;height:4px;border-radius:99px;background:var(--border);}
  .rc-head{position:relative;}
  /* mobile bottom action bar */
  .mob-bar{display:flex;position:fixed;left:0;right:0;bottom:0;background:var(--bg2);border-top:1px solid var(--border);padding:.6rem .8rem calc(.6rem + var(--safe-b));gap:8px;z-index:40;}
  body.zen .mob-bar{display:none;}
  .mob-bar-btn{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:12px;padding:11px;font-size:12px;font-weight:600;display:flex;flex-direction:column;align-items:center;gap:3px;min-height:50px;justify-content:center;transition:all .2s;}
  .mob-bar-btn:hover,.mob-bar-btn.active{border-color:var(--accent);color:var(--accent);}
  .mob-bar-btn svg{width:18px;height:18px;}
  .left-col{padding-bottom:74px;overflow-y:auto;}
  .stage{padding:1.5rem 1.2rem;}
  .app-topbar{padding-left:1.1rem;padding-right:1.1rem;}
  .app-topbar .tb-right .desktop-only{display:none;}
  .desktop-only{display:none!important;}
  .day-bar{padding:.6rem 1.1rem;}
  .prog-head{flex-wrap:wrap;gap:1rem;}
  .lifetime-row{grid-template-columns:1fr;}
  .reward-grid{grid-template-columns:1fr;}
  .modal{max-height:92vh;border-radius:var(--r-xl) var(--r-xl) 0 0;align-self:flex-end;max-width:100%;}
  .modal-ov{align-items:flex-end;padding:0;}
  .set-tabs{top:65px;}
  .cnt-num{font-size:64px;}
  .flow-prog{max-width:140px;}
}
@media(max-width:820px) and (orientation:landscape){
  .ring-wrap{margin:0;}
  .stage{gap:.7rem;padding:.8rem;}
}
/* desktop: hide mobile-only */
@media(min-width:821px){
  .mob-only{display:none!important;}
}
.banner{position:fixed;top:max(1rem,var(--safe-t));left:50%;transform:translateX(-50%) translateY(-120%);background:var(--accent);color:var(--at);padding:11px 22px;border-radius:99px;font-size:13px;font-weight:600;z-index:200;transition:transform .4s;box-shadow:0 6px 24px var(--glow);max-width:90vw;text-align:center;}
.banner.show{transform:translateX(-50%) translateY(0);}
.privacy-note{font-size:11.5px;color:var(--muted);line-height:1.6;text-align:center;}
</style>
</head>
<body>
<div id="atmos"></div>
<div id="bgPhoto"></div>
<div class="banner" id="banner"></div>

<!-- ════════ HOME / START ════════ -->
<div class="screen" id="home">
  <div class="home-wrap">
    <div class="home-top">
      <div class="logo"><div class="logo-dot"></div>FocusBlock</div>
      <div class="home-top-actions">
        <div class="home-streak" id="homeStreak" onclick="goProgress()" style="display:none;"><span>🔥</span><span id="homeStreakNum">0</span></div>
        <button class="icon-btn" id="homeProgBtn" onclick="goProgress()" title="Progress" style="display:none;">📊</button>
        <button class="icon-btn" onclick="openSettings()" title="Settings">⚙</button>
      </div>
    </div>
    <div class="home-hero fade-in">
      <div class="home-greet" id="homeGreet"></div>
      <div class="home-title" id="homeTitle">Plan your day.<br><em>Own your focus.</em></div>
      <div class="home-sub" id="homeSub">Pick how you want to start. You don't have to study all day — just a few focused blocks, done well.</div>
    </div>
    <div class="cards fade-in" id="startCards"></div>
    <div class="home-foot-note" id="homeFootNote"></div>
  </div>
</div>

<!-- ════════ FLOW (onboarding & planners) ════════ -->
<div class="screen out" id="flow">
  <div class="flow-wrap">
    <div class="flow-head">
      <button class="flow-back" onclick="flowBack()"><span>←</span> <span id="flowBackLbl">Back</span></button>
      <div class="flow-prog" id="flowProg"></div>
      <div class="flow-step-lbl" id="flowStepLbl"></div>
    </div>
    <div id="flowSteps"></div>

/* ══════════════════════════════════════════════════════
   FocusBlock — state, storage, helpers
   ══════════════════════════════════════════════════════ */
const LS_KEY='focusblock_v2';
const DB_NAME='focusblock_db', DB_STORE='kv';

/* ---- persistent state ---- */
let S = {
  focus:50, short:10, long:25, longAfter:4,
  theme:'lime', light:false, sound:'soft', tips:true,
  lang:'en', bgPhoto:'', ambient:'none',
  timerLayout:'ring', animLevel:'balanced',
  companion:'plant', companionName:'', companionVis:'focus',
  companionTone:'friendly', companionSound:'off'
};
let userName='';
let subjects=[];            // master subject list [{name,color}]
let streak=0, lastDay=null;
let lifetimeBlocks=0, lifetimeMins=0, lifetimeFocusPoints=0, houseProgress=0;
let history=[];             // [{date, blocks, mins, subjects:{name:mins}}]
let subjectTotals={};       // {name: minutes} lifetime
let lastPlan=null;          // {focus,short,long,longAfter,blocks:[{subject,mins,note,tasks}]}
let onboarded=false;
let _t={};                  // settings draft

/* ---- session/runtime state ---- */
let blocks=[];              // active day blocks
let nid=1, curPhase='focus', curBlock=0;
let timeLeft=0, totalTime=0, running=false, iv=null;
let endTimestamp=0;         // real wall-clock end (background-safe)
let sessComp=0;             // completed focus sessions today
let completedMins=0;        // minutes from FINISHED focus blocks
let currentSessionMins=0;   // minutes elapsed in the running focus block
let dayCounted=false;
let needsComeback=false;
let audioCtx=null;
let flowMode=null;          // 'onboard' | 'quick'(skips) | 'plan' | 'short' | 'edit-settings'
let flowStep=0, flowSteps=[];
let progReturn='home';      // where to return from progress

/* draft used during flow */
let D={};

/* palette for subject dots */
const SUBJ_COLORS=['#c8f060','#fb7185','#67e8f9','#fcd34d','#c084fc','#6ee7b7','#f0a868','#a3e635','#38bdf8','#f472b6'];
function colorFor(name){
  const s=subjects.find(x=>x.name===name);
  if(s&&s.color)return s.color;
  let h=0;for(let i=0;i<name.length;i++)h=name.charCodeAt(i)+((h<<5)-h);
  return SUBJ_COLORS[Math.abs(h)%SUBJ_COLORS.length];
}

/* ---- date helpers ---- */
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
// Study-day boundary: 4am. So sessions that run past midnight still count as "the same day" until 04:00.
function studyDayStr(){const d=new Date(Date.now()-4*3600*1000);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function daysBetween(a,b){return Math.round((new Date(b)-new Date(a))/86400000);}
function fmt(s){s=Math.max(0,Math.round(s));const m=Math.floor(s/60),sec=s%60;return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');}
function fmtClock(d){return d.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',hour12:false});}
function fmtDur(m){m=Math.round(m);const h=Math.floor(m/60),mn=m%60;return mn?(h?h+'h '+mn+'m':mn+'m'):(h?h+'h':'0m');}
function esc(s){const d=document.createElement('div');d.textContent=s==null?'':String(s);return d.innerHTML;}

/* ---- storage (localStorage + IndexedDB fallback for file://) ---- */
function buildPayload(){
  return {
    v:2, onboarded, name:userName, subjects, lastPlan,
    focus:S.focus, short:S.short, long:S.long, longAfter:S.longAfter,
    theme:S.theme, light:S.light, sound:S.sound, tips:S.tips, lang:S.lang,
    bgPhoto:S.bgPhoto, ambient:S.ambient, timerLayout:S.timerLayout, animLevel:S.animLevel,
    companion:S.companion, companionName:S.companionName, companionVis:S.companionVis,
    companionTone:S.companionTone, companionSound:S.companionSound,
    streak, lastDay, lifetimeBlocks, lifetimeMins, lifetimeFocusPoints, houseProgress,
    history, subjectTotals,
    // active day (so refresh mid-session doesn't lose the day)
    activeDay: blocks.length ? {
      date:studyDayStr(), blocks, curBlock, curPhase, timeLeft, totalTime,
      endTimestamp: running ? endTimestamp : 0,
      sessComp, completedMins, currentSessionMins, dayCounted, running:false
    } : null
  };
}
function idbOpen(){return new Promise((res,rej)=>{const r=indexedDB.open(DB_NAME,1);r.onupgradeneeded=()=>r.result.createObjectStore(DB_STORE);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});}
async function idbSet(d){try{const db=await idbOpen();return new Promise((res)=>{const tx=db.transaction(DB_STORE,'readwrite');tx.objectStore(DB_STORE).put(d,'data');tx.oncomplete=()=>res();tx.onerror=()=>res();});}catch(e){}}
async function idbGet(){try{const db=await idbOpen();return new Promise((res)=>{const tx=db.transaction(DB_STORE,'readonly');const rq=tx.objectStore(DB_STORE).get('data');rq.onsuccess=()=>res(rq.result||null);rq.onerror=()=>res(null);});}catch(e){return null;}}
let saveT=null;
function saveData(){
  const d=buildPayload();
  try{localStorage.setItem(LS_KEY,JSON.stringify(d));}catch(e){}
  clearTimeout(saveT);saveT=setTimeout(()=>idbSet(d),400);
}
function loadLocal(){try{const r=localStorage.getItem(LS_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}

  function cafe(x,s){s=s||1;return `<g transform="translate(${x},134) scale(${s})"><rect x="0" y="10" width="46" height="30" fill="none" stroke="${mid}" stroke-width="2.5"/><path d="M0 10 L46 10 L46 4 L0 4 Z" fill="${acc}" opacity="0.4"/><path d="M0 4 q5 -6 11 0 q5 -6 11 0 q5 -6 11 0 q5 -6 11 0" fill="none" stroke="${mid}" stroke-width="1.5"/><rect x="8" y="22" width="10" height="18" fill="${acc}" opacity="0.45"/><rect x="28" y="20" width="10" height="9" fill="${acc}" opacity="0.3"/></g>`;}
  let scene='';
  if(idx===0){scene=`<text x="200" y="120" text-anchor="middle" fill="${mid}" font-family="DM Mono,monospace" font-size="13" opacity="0.5">…</text>`;}
  else if(idx===1){scene=tent(180);}
  else if(idx===2){scene=tent(120,0.8)+cabin(190);}
  else if(idx===3){scene=tent(70,0.7)+cabin(140,0.85)+house(220);}
  else if(idx===4){scene=tent(40,0.6)+cabin(95,0.7)+house(160,0.85)+lib(240);}
  else if(idx===5){scene=tent(25,0.55)+cabin(75,0.6)+house(130,0.7)+lib(200,0.85)+cafe(290,0.9);}
  else {
    // full village
    const extra=Math.min(4,Math.floor((p-500)/120));
    scene=tent(20,0.5)+cabin(60,0.55)+house(110,0.62)+house(175,0.55)+lib(225,0.7)+cafe(305,0.75);
    for(let i=0;i<extra;i++)scene+=house(30+i*40,0.4);
  }
  return `<svg viewBox="0 0 400 230" xmlns="http://www.w3.org/2000/svg">${sky}${stars}${ground}${pathEl}${scene}</svg>`;
}

/* ====================== APPLY: THEME / LANG / BODY ====================== */
function applyBodyClass(){
  const b=document.body;
  // remove theme + light classes
  THEMES.forEach(t=>{if(t.cls)b.classList.remove(t.cls);});
  b.classList.remove('lt');
  const cls=themeCls(S.theme); if(cls)b.classList.add(cls);
  if(S.light)b.classList.add('lt');
  // ambient
  const atmos=document.getElementById('atmos');
  atmos.style.background=(S.ambient&&S.ambient!=='none')?(AMBIENTS[S.ambient]||''):'';
  atmos.style.opacity=(S.ambient&&S.ambient!=='none')?'1':'0';
  // bg photo
  const bp=document.getElementById('bgPhoto');
  if(S.bgPhoto){bp.style.backgroundImage='url('+S.bgPhoto+')';bp.classList.add('on');b.classList.add('has-bg');}
  else{bp.style.backgroundImage='';bp.classList.remove('on');b.classList.remove('has-bg');}
}
function applyAnimLevel(){
  document.body.classList.remove('anim-minimal','anim-expressive');
  if(S.animLevel==='minimal')document.body.classList.add('anim-minimal');
  else if(S.animLevel==='expressive')document.body.classList.add('anim-expressive');
}

/* ====================== SCREEN ROUTER ====================== */
const SCREENS=['home','flow','app','progress'];
function showScreen(id){
  SCREENS.forEach(s=>{
    const el=document.getElementById(s);
    if(!el)return;
    if(s===id){el.style.display='flex';requestAnimationFrame(()=>el.classList.remove('out'));}
    else{el.classList.add('out');el.style.display='none';}
  });
  window.scrollTo(0,0);
}
function goHome(){
  exitZen(); stopTimer();
  document.body.classList.remove('ph-focus','ph-short','ph-long');

}
function goApp(){ applyPhaseClass(); showScreen('app'); renderApp(); }
function goProgress(from){ progReturn=from||'home'; renderProgress(); showScreen('progress'); }

/* ====================== FLOW ENGINE ====================== */
function startMode(mode){
  if(mode==='quick'){ startQuick(); return; }
  if(mode==='last'){ continueLast(); return; }
  flowMode=mode; flowStep=0; D={};
  if(mode==='plan'){
    D.subjects=subjects.map(s=>s.name);
    D.durIdx=getDurs().findIndex(d=>d.min===S.focus); if(D.durIdx<0)D.durIdx=getDurs().findIndex(d=>d.rec);
    D.count=4;
    flowSteps=['dur','count','assign','ready'];
  } else if(mode==='short'){
    D.chosen=[]; D.time=120;
    flowSteps=['short_subj','short_focus','short_time','ready'];
  }
  showScreen('flow'); renderFlowStep();
}
function startOnboard(){
  flowMode='onboard'; flowStep=0; D={subjects:[]};
  flowSteps=['lang','name','subjects','companion','theme','ready_onb'];
  showScreen('flow'); renderFlowStep();
}
function flowBack(){
  if(flowStep>0){ flowStep--; renderFlowStep(); }
  else { if(flowMode==='onboard') showScreen('flow'); else goHome(); }
}
function flowNext(){
  if(flowStep<flowSteps.length-1){ flowStep++; renderFlowStep(); }
}
function renderFlowProg(){
  const p=document.getElementById('flowProg'); p.innerHTML='';
  for(let i=0;i<flowSteps.length;i++){
    const d=document.createElement('div'); d.className='fp'+(i<flowStep?' don':i===flowStep?' act':''); p.appendChild(d);
  }
  document.getElementById('flowStepLbl').textContent=(flowStep+1)+' / '+flowSteps.length;
  document.getElementById('flowBackLbl').textContent=T('back');
}
function fstepHTML(q,hint,body,ctaLabel,ctaEnabled){
  return `<div class="fstep show"><div class="fstep-q">${q}</div>${hint?`<div class="fstep-hint">${esc(hint)}</div>`:''}${body}<div class="flow-cta"><button class="btn-primary" id="flowCta" ${ctaEnabled===false?'disabled':''}>${esc(ctaLabel)}</button></div></div>`;
}
function renderFlowStep(){
  renderFlowProg();
  const step=flowSteps[flowStep];
  const host=document.getElementById('flowSteps');
  if(step==='lang') renderStepLang(host);
  else if(step==='name') renderStepName(host);
  else if(step==='subjects') renderStepSubjects(host);
  else if(step==='companion') renderStepCompanion(host);
  else if(step==='theme') renderStepTheme(host);
  else if(step==='dur') renderStepDur(host);
  else if(step==='count') renderStepCount(host);
  else if(step==='assign') renderStepAssign(host);
  else if(step==='short_subj') renderStepShortSubj(host);
  else if(step==='short_focus') renderStepShortFocus(host);
  else if(step==='short_time') renderStepShortTime(host);
  else if(step==='ready'||step==='ready_onb') renderStepReady(host,step==='ready_onb');
}

/* --- step: count --- */
function renderStepCount(host){
  if(!D.count)D.count=4;
  host.innerHTML=fstepHTML(T('count_q'),T('count_hint'),
    `<div class="cnt-pick"><div class="cnt-num" id="cntNum">${D.count}</div><div class="cnt-ctrls"><button class="cnt-btn" id="cntMinus">−</button><button class="cnt-btn" id="cntPlus">+</button></div></div><div class="cnt-info" id="cntInfo"></div>`,
    T('next'));
  const upd=()=>{
    document.getElementById('cntNum').textContent=D.count;
    const durs=getDurs(); const d=durs[D.durIdx]||durs.find(x=>x.rec);
    const focusMins=D.count*d.min;
    const breakMins=(D.count-1)*d.brk; // breaks between sessions
    // estimate end time
    let endStr='';
    const startSrc=D.startTime||null;
    if(startSrc){
      const [sh,sm]=startSrc.split(':').map(Number);
      const endMins=sh*60+sm+focusMins+breakMins;
      const eh=Math.floor(endMins/60)%24, em=endMins%60;
      endStr=` · klaar om <strong>${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}</strong>`;
    } else {
      // use now+10min rounded
      const now=new Date();
      const startMins=Math.ceil((now.getHours()*60+now.getMinutes()+10)/10)*10;
      const endMins=startMins+focusMins+breakMins;
      const eh=Math.floor(endMins/60)%24, em=endMins%60;
      endStr=` · klaar ~<strong>${String(eh).padStart(2,'0')}:${String(em).padStart(2,'0')}</strong>`;
    }
    document.getElementById('cntInfo').innerHTML=`<strong>${D.count}</strong> × ${d.min} min · ${fmtDur(focusMins)}${endStr}`;
  };
  document.getElementById('cntMinus').onclick=()=>{D.count=Math.max(1,D.count-1);upd();};
  document.getElementById('cntPlus').onclick=()=>{D.count=Math.min(12,D.count+1);upd();};
  upd();
  document.getElementById('flowCta').onclick=()=>{ buildAssignDrafts(); flowNext(); };
}
function buildAssignDrafts(){
  const durs=getDurs(); const d=durs[D.durIdx]||durs.find(x=>x.rec);
  if(!D.bb)D.bb=[];
  // preserve existing pause blocks; only resize focus blocks
  const pauseBlocks=D.bb.filter(b=>b.isPause);
  const focusBlocks=D.bb.filter(b=>!b.isPause);
  while(focusBlocks.length<D.count) focusBlocks.push({subject:'',mins:d.min,note:'',tasks:[],noteOpen:false});
  focusBlocks.length=D.count;
  // default minutes to chosen duration if unset
  focusBlocks.forEach(b=>{ if(!b.mins)b.mins=d.min; });
  // merge back: rebuild as alternating would be complex, just put pause blocks at end if newly added
  // For a fresh build, focusBlocks only; pause blocks come from builder interaction
  D.bb=focusBlocks;
}
/* --- step: assign (per-block builder) --- */
function renderStepAssign(host){
  buildAssignDrafts();
  if(!D.startTime){
    // default: now + 10 min, rounded up to next 10-minute mark
    const now=new Date();
    const totalMins=now.getHours()*60+now.getMinutes()+10;
    const rounded=Math.ceil(totalMins/10)*10;
    const h=Math.floor(rounded/60)%24;
    const m=rounded%60;
    D.startTime=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
  }
  host.innerHTML=fstepHTML(T('assign_q'),T('assign_hint'),
    `<div class="assign-starttime"><label>🕐 Start om</label><input type="time" id="startTimeInp" value="${D.startTime}"></div>
     <div class="quick-add-label">Snel toevoegen</div>
     <div class="bb-quick-row">
       <button class="bb-quick-btn" id="bbAdd25">＋ 25 min</button>
       <button class="bb-quick-btn" id="bbAdd50">＋ 50 min</button>
       <button class="bb-quick-btn bb-quick-pause" id="addPauseBtn">⏸ Pauzeblok</button>
     </div>
     <div class="block-builder" id="bbHost"></div>`,
    T('next'));
  document.getElementById('startTimeInp').oninput=(e)=>{ D.startTime=e.target.value; drawBuilder(); };
  document.getElementById('bbAdd25').onclick=()=>{
    D.bb.push({subject:'',mins:25,note:'',tasks:[],noteOpen:false});
    D.count=D.bb.filter(b=>!b.isPause).length; drawBuilder();
    setTimeout(()=>{ const h=document.getElementById('bbHost'); if(h)h.scrollTop=h.scrollHeight; },50);
  };
  document.getElementById('bbAdd50').onclick=()=>{
    D.bb.push({subject:'',mins:50,note:'',tasks:[],noteOpen:false});
    D.count=D.bb.filter(b=>!b.isPause).length; drawBuilder();
    setTimeout(()=>{ const h=document.getElementById('bbHost'); if(h)h.scrollTop=h.scrollHeight; },50);
  };
  document.getElementById('addPauseBtn').onclick=()=>{
    D.bb.push({subject:'__pause__',mins:60,note:'',tasks:[],noteOpen:false,isPause:true});
    D.count=D.bb.length; drawBuilder();
    setTimeout(()=>{ const h=document.getElementById('bbHost'); if(h)h.scrollTop=h.scrollHeight; },50);
  };
  drawBuilder();
  document.getElementById('flowCta').onclick=flowNext;
}
function subjectOptionsHTML(sel){
  let o=`<option value="">${esc(T('pick_subject'))}</option>`;
  subjects.forEach(s=>{ o+=`<option value="${esc(s.name)}"${s.name===sel?' selected':''}>${esc(s.name)}</option>`; });
  o+=`<option value="__custom__">${esc(T('custom_subject'))}</option>`;
  return o;
}
function calcDoneBy(idx){
  // returns wall-clock time when block[idx] FINISHES (not including any break after it)
  if(!D.startTime) return '';
  const [hh,mm] = D.startTime.split(':').map(Number);
  let totalMins = hh*60+mm;
  const durs=getDurs(); const d=durs[D.durIdx]||durs.find(x=>x.rec);
  const brkMin=D._shortBrk||d.brk;
  for(let i=0;i<=idx;i++){
    const b=D.bb[i]; if(!b) break;
    // add this block's own duration
    totalMins+=b.mins;
    // after this block (but before idx), add the gap to the next block
    if(i<idx){
      const next=D.bb[i+1];
      if(next && next.isPause){
        // next block is an explicit pause — its duration will be added in the next iteration
        // don't add auto-break here
      } else if(b.isPause){
        // current is pause, next is focus — no extra gap
      } else {
        // focus → focus: add auto short break
        totalMins+=brkMin;
      }
    }
  }
  const h=Math.floor(totalMins/60)%24, m=totalMins%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}
function drawBuilder(){
  const host=document.getElementById('bbHost'); if(!host)return;
  host.innerHTML='';
  let focusNum=0;
  D.bb.forEach((b,i)=>{
    if(!b.isPause) focusNum++;
    const card=document.createElement('div');
    const doneBy=calcDoneBy(i);
    const dragHandle=`<div class="bb-drag-handle" title="Slepen om te verplaatsen">⠿</div>`;
    if(b.isPause){
      card.className='bb-card bb-pause';
      card.dataset.idx=i;
      card.innerHTML=`
        <div class="bb-top">
          ${dragHandle}
          <div class="bb-num">⏸</div>
          <span class="bb-pause-lbl">Lange pauze</span>
          ${D.bb.length>1?`<button class="bb-x" title="Verwijder">✕</button>`:''}
        </div>
        <div class="bb-pause-mins"><span>minuten</span><input type="number" min="15" max="180" step="15" value="${b.mins}"><span class="bb-done-by bb-done-by-pause">pauze tot ${doneBy}</span></div>`;
      card.querySelector('.bb-pause-mins input').oninput=(e)=>{ b.mins=Math.max(15,Math.min(180,+e.target.value||15)); updateDoneByTimes(); };
      const x=card.querySelector('.bb-x'); if(x)x.onclick=()=>{ D.bb.splice(i,1); D.count=D.bb.filter(b=>!b.isPause).length; drawBuilder(); };
    } else {
      card.className='bb-card';
      card.dataset.idx=i;

/* --- short on time: smart auto-planner --- */
function autoPlanShort(){
  const durs=getDurs();
  let base=durs.find(d=>d.rec)||durs[2];
  let chosen=base;
  if(D.time<=60) chosen=durs.find(d=>d.min===25)||durs[0];
  else if(D.time<=100) chosen=durs.find(d=>d.min===40)||durs[1];
  const focusMin=chosen.min, brkMin=chosen.brk;
  const subs=D.chosen.length?D.chosen:subjects.map(s=>s.name); // D.chosen is now priority-sorted
  const per=focusMin+brkMin;
  let n=Math.max(1,Math.floor((D.time+brkMin)/per));
  n=Math.max(n, Math.min(subs.length, 8));
  n=Math.min(n,8);

  // assign time weights: rank 0 = 100%, rank 1 = 70%, rank 2+ = 50% of base
  const weights=subs.map((_,i)=> i===0?1.0 : i===1?0.7 : 0.5);
  // total weight across all blocks (round-robin)
  let totalWeight=0;
  for(let i=0;i<n;i++) totalWeight+=weights[i%subs.length];
  // available focus time (total minus breaks)
  const totalFocus=D.time - (n-1)*brkMin;
  const baseUnit=Math.max(15, Math.floor(totalFocus/totalWeight/5)*5); // round to 5min

  const bb=[];
  for(let i=0;i<n;i++){
    const subj=subs[i%subs.length];
    const w=weights[i%subs.length];
    const mins=Math.max(15, Math.min(120, Math.round(baseUnit*w/5)*5));
    const note=(D.focusNotes&&D.focusNotes[subj])||'';
    bb.push({subject:subj,mins,note,tasks:[],noteOpen:false});
  }
  D.bb=bb; D.durIdx=durs.indexOf(chosen); D.count=n;
  D._shortBrk=brkMin;
}

function commitPlan(d,brkMin){
  // make sure any custom subjects get added to master list
  D.bb.forEach(b=>{ if(b.subject && !b.isPause) addSubject(b.subject); });
  S.focus=d.min; S.short=brkMin;
  // build active blocks (including pause blocks)
  blocks=D.bb.filter(b=>b.mins).map((b,i)=>({
    id:nid++, subject:(b.isPause?'__pause__':(b.subject||'').trim()), mins:b.mins||d.min,
    note:b.note||'', tasks:(b.tasks||[]).filter(t=>t.text&&t.text.trim()).map(t=>({text:t.text.trim(),done:false})),
    done:false, status:null, isPause:!!b.isPause
  }));
  if(!blocks.length){ banner(T('no_subjects')); return; }
  // save lastPlan
  lastPlan={ focus:d.min, short:brkMin, long:S.long, longAfter:S.longAfter,
    blocks:blocks.map(b=>({subject:b.subject,mins:b.mins,note:b.note,tasks:b.tasks.map(t=>({text:t.text})),isPause:b.isPause})) };
  initDay();
  saveData();
  goApp();
}

function startQuick(){
  const rec=getDurs().find(d=>d.rec)||getDurs()[2];
