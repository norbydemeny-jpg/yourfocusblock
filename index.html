function continueLast(){
  if(!lastPlan||!Array.isArray(lastPlan.blocks)||!lastPlan.blocks.length){ banner(T('no_subjects')); goHome(); return; }
  S.focus=lastPlan.focus; S.short=lastPlan.short;
  if(lastPlan.long)S.long=lastPlan.long; if(lastPlan.longAfter)S.longAfter=lastPlan.longAfter;
  blocks=lastPlan.blocks.map(b=>({id:nid++,subject:b.subject||'',mins:b.mins,note:b.note||'',
    tasks:(b.tasks||[]).map(t=>({text:t.text,done:false})),done:false,status:null,isPause:!!b.isPause}));
  initDay(); saveData(); goApp();
}

function initDay(){

/* ====================== FOCUS APP RENDER ====================== */
function curB(){ return blocks[curBlock]||null; }
function phaseDur(ph){
  if(ph==='focus'){
    const b=curB();
    if(b&&b.isPause) return b.mins*60; // pause block duration
    return (b&&b.mins?b.mins:S.focus)*60;
  }
  if(ph==='short') return S.short*60;
  return S.long*60;
}
function setPhase(ph,resetOnly){
  // if entering focus and current block is a pause block, treat it as a long-style break
  const b=curB();
  if(ph==='focus' && b && b.isPause){
    curPhase='pause-block';
  } else {
    curPhase=ph;
  }
  totalTime=phaseDur(ph);
  timeLeft=totalTime;
  running=false;
  if(iv){clearInterval(iv);iv=null;}
  applyPhaseClass();
  renderApp();
}
function applyPhaseClass(){
  document.body.classList.remove('ph-focus','ph-short','ph-long');
  const ph=curPhase==='pause-block'?'long':curPhase;
  document.body.classList.add('ph-'+ph);
}
function manualPhase(ph){
  if(running){ return; } // don't switch mid-run silently
  setPhase(ph,true);
}

function renderApp(){
  const app=document.getElementById('app');
  // layout class
  app.classList.remove('lay-ring','lay-minimal','lay-card');
  app.classList.add('lay-'+(S.timerLayout||'ring'));
  // streak
  document.getElementById('appStreakNum').textContent=streak;

  renderDayBar();
  // phase tabs labels + active
  document.getElementById('ptabFocus').textContent=T('ptab_focus');
  document.getElementById('ptabShort').textContent=T('ptab_short');
  document.getElementById('ptabLong').textContent=T('ptab_long');
  document.querySelectorAll('.ptab').forEach(t=>t.classList.toggle('on',t.dataset.ph===curPhase));
  // mission
  renderMission();
  // ring + time
  sizeRing(); drawRing();
  updateTimeText();
  // ends pill
  updateEndsPill();

  updatePlayBtn();
  document.getElementById('btnRestart').textContent=T('restart');
  document.getElementById('btnSkip').textContent=(curPhase==='pause-block')?'Pauze overslaan':T('skip_btn');
  document.getElementById('btnSkip').style.display=(curPhase==='focus'||curPhase==='pause-block')?'':'none';

  document.getElementById('mobPlanLbl').textContent=T('card_plan_t').split(' ')[0]||'Plan';
  document.getElementById('mobZenLbl').textContent=T('ptab_focus');
  document.getElementById('mobProgLbl').textContent=T('prog_title').split(' ').pop();
  document.getElementById('mobSetLbl').textContent=T('set_title');
  document.getElementById('zenExitBtn').innerHTML='✕ '+esc(T('cancel'));
  // motiv
  updateMotiv();
  // companion
  renderCompanionStage();
  // planning labels
  document.getElementById('rcHeadTitle').textContent=T('today_sessions');
  // calculate estimated end time
  const endEl=document.getElementById('rcEndtime');
  if(endEl){
    const undoneBlocks=blocks.filter(b=>!b.done&&!b.skipped);
    if(undoneBlocks.length){
      let remainMins=0;
      const undoneFocus=undoneBlocks.filter(b=>!b.isPause);
      undoneBlocks.forEach((b,i)=>{
        remainMins+=b.mins;
        // add auto break after a focus block only if next undone block is also focus (no explicit pause between)
        if(!b.isPause && i<undoneBlocks.length-1){
          const next=undoneBlocks[i+1];
          if(next && !next.isPause){
            const focusDone=sessComp+(undoneFocus.indexOf(b));
            remainMins+=(focusDone>0&&(focusDone+1)%S.longAfter===0)?S.long:S.short;
          }
          // if next is an explicit pause, its duration is already counted in the loop — no auto-break needed
        }
      });
      if(running) remainMins=Math.max(0,remainMins-Math.floor((totalTime-timeLeft)/60));
      const now=new Date();
      const endMins=now.getHours()*60+now.getMinutes()+Math.ceil(remainMins);
      const eh=Math.floor(endMins/60)%24, em=endMins%60;
      const endStr=String(eh).padStart(2,'0')+':'+String(em).padStart(2,'0');
      endEl.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg><span>klaar om</span><span class="rc-endtime-val">${endStr}</span>`;
    } else {
      endEl.innerHTML='';
    }
  }
  document.getElementById('addBlockBtn').textContent=T('add_session');
  renderBuildStrip();
  renderBlocks();
  // zen session strip
  renderZenStrip();
}
function renderZenStrip(){
  const znEl=document.getElementById('zenNextup');
  if(znEl) znEl.textContent='';
  const strip=document.getElementById('zenStrip');
  if(!strip) return;
  strip.innerHTML='';
  const focusBlocks=blocks.filter(b=>!b.isPause);
  const visible=[];
  blocks.forEach((b,i)=>{ if(!b.isPause) visible.push({b,i}); });
  const curFocusPos=visible.findIndex(v=>v.i===curBlock);
  const start=Math.max(0,curFocusPos-1);
  const end=Math.min(visible.length,start+5);
  const slice=visible.slice(start,end);
  slice.forEach((v,si)=>{
    const prevBlock=v.i>0?blocks[v.i-1]:null;
    if(prevBlock&&prevBlock.isPause&&si>0){
      const pd=document.createElement('div');
      pd.className='zs-block zs-pause'+(prevBlock.done?' zs-done':'');
      pd.innerHTML=`<div class="zs-dot"></div><span class="zs-label">⏸</span><span class="zs-mins">${prevBlock.mins}m</span>`;
      strip.appendChild(pd);
      const sep=document.createElement('div'); sep.className='zs-sep'; strip.appendChild(sep);
    }
    const b=v.b; const i=v.i;
    let state='zs-future';
    if(b.done||b.skipped) state='zs-done';
    else if(i===curBlock) state='zs-cur';
    else if(si===slice.findIndex(x=>!x.b.done&&!x.b.skipped&&x.i!==curBlock)&&i>curBlock) state='zs-next';
    const el=document.createElement('div');
    el.className='zs-block '+state;
    const label=b.subject||T('phase_focus');
    const checkmark=b.done?'✓ ':'';
    el.innerHTML=`<div class="zs-dot"></div><span class="zs-label">${checkmark}${esc(label)}</span><span class="zs-mins">${b.mins}m</span>`;
    strip.appendChild(el);
    if(si<slice.length-1){ const sep=document.createElement('div'); sep.className='zs-sep'; strip.appendChild(sep); }
  });
  if(end<visible.length){
    const more=visible.length-end;
    const sep=document.createElement('div'); sep.className='zs-sep'; strip.appendChild(sep);
    const el=document.createElement('div');
    el.className='zs-block zs-future';
    el.innerHTML=`<span class="zs-label">+${more}</span>`;
    strip.appendChild(el);
  }
}

/* ring sizing — responsive */
function sizeRing(){
  const wrap=document.getElementById('ringWrap');
  const stage=document.getElementById('stage');
  if(!wrap||!stage)return;
  const avail=Math.min(stage.clientWidth||360, (window.innerHeight||700)*0.46);
  let size=Math.max(200,Math.min(360,avail-40));
  if(document.body.classList.contains('zen')) size=Math.max(240,Math.min(420,Math.min(stage.clientWidth-40,(window.innerHeight)*0.55)));
  wrap.style.width=size+'px'; wrap.style.height=size+'px';
  const svg=document.getElementById('ringSvg');
  svg.setAttribute('viewBox','0 0 '+size+' '+size);
  const sw=Math.max(8,Math.round(size*0.035));
  const r=(size-sw)/2-2;
  const cx=size/2;
  ['ringBg','ringFg'].forEach(id=>{const c=document.getElementById(id);c.setAttribute('cx',cx);c.setAttribute('cy',cx);c.setAttribute('r',r);c.setAttribute('stroke-width',sw);});
  const circ=2*Math.PI*r;
  const fg=document.getElementById('ringFg');
  fg.setAttribute('stroke-dasharray',circ);
  fg._circ=circ;
  // time font size
  document.getElementById('tTime').style.fontSize=Math.round(size*0.2)+'px';
}
function drawRing(){
  const fg=document.getElementById('ringFg');
  const circ=fg._circ||(2*Math.PI*140);
  const frac=totalTime>0?(timeLeft/totalTime):0;
  fg.setAttribute('stroke-dashoffset',circ*(1-frac));
}

/* ====================== TIMER ENGINE (background-safe) ====================== */
// Wake Lock: prevents device/screen sleep while timer is running
let _wakeLock=null;
async function acquireWakeLock(){
  if(!('wakeLock' in navigator))return;
  try{ _wakeLock=await navigator.wakeLock.request('screen'); }catch(e){}
}
function releaseWakeLock(){
  if(_wakeLock){try{_wakeLock.release();}catch(e){}  _wakeLock=null;}
}
// Re-acquire wake lock when tab becomes visible again (browsers release it when tab hides)
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden && running) acquireWakeLock();
});

function startTimer(){
  if(running||timeLeft<=0)return;
  running=true;
  requestNotifPerm();
  endTimestamp=Date.now()+timeLeft*1000;
  if(iv)clearInterval(iv);
  iv=setInterval(tick,250);
  acquireWakeLock();
  document.body.classList.add('running');
  updatePlayBtn(); updateEndsPill(); updateMotiv(); renderCompanionStage();
  if(S.bgPhoto||S.ambient!=='none'){} // dim handled by css
}
function pauseTimer(){
  running=false;
  if(iv){clearInterval(iv);iv=null;}
  releaseWakeLock();
  document.body.classList.remove('running');
  // record elapsed minutes into current session (for focus)
  updatePlayBtn(); updateEndsPill(); updateMotiv(); renderCompanionStage();
}
function stopTimer(){
  running=false;
  if(iv){clearInterval(iv);iv=null;}
  releaseWakeLock();
  document.body.classList.remove('running');
}
function tick(){
  const now=Date.now();
  timeLeft=Math.max(0,Math.round((endTimestamp-now)/1000));
  if(curPhase==='focus'){
    const elapsed=(totalTime-timeLeft)/60;
    currentSessionMins=Math.max(0,Math.min((curB()?.mins||S.focus),Math.round(elapsed)));
  }
  drawRing(); updateTimeText();
  if(curPhase==='focus') renderDayBar();
  if(timeLeft<=0){ phaseComplete(); }
}
function toggleTimer(){
  if(running){
    // soft pause confirm
    askPause();
  } else {
    startTimer();
  }
}
function askPause(){
  if(curPhase!=='focus'){ pauseTimer(); return; }
  const minIn=Math.round((totalTime-timeLeft)/60);
  const leftMin=Math.ceil(timeLeft/60);
  const title = S.lang==='nl'?T('pause_t'):T('pause_t_en');
  showConfirm('⏸', title,
    Tf('pause_msg',{min:minIn,left:leftMin}),
    T('pause_continue'), T('pause_pause'),
    ()=>{ pauseTimer(); });
}
function resetTimer(){
  stopTimer();
  if(curPhase==='focus')currentSessionMins=0;
  setPhase(curPhase,true);
}

/* phase completed naturally (timer hit 0) */
function phaseComplete(){
  stopTimer();
  playChime();
  // flash the ring
  const rw=document.getElementById('ringWrap');
  if(rw){ rw.classList.remove('flash'); void rw.offsetWidth; rw.classList.add('flash'); setTimeout(()=>rw.classList.remove('flash'),900); }
  if(curPhase==='focus'){
    sendNotif('🎯 Focusblok klaar!', curB()&&curB().subject?`${curB().subject} — goed gedaan!`:'Tijd voor een pauze.');
  } else {
    sendNotif('⏰ Pauze voorbij!','Klaar voor het volgende focusblok?');
  }
  if(curPhase==='focus'){
    const b=curB();
    // if it's a pause block, just advance
    if(b && b.isPause){
      b.done=true;
      advanceAfterBreak();
      return;
    }
    const mins=b?b.mins:S.focus;
    // count it ONCE
    completedMins+=mins; currentSessionMins=0;
    sessComp++;
    if(b){ b.done=true; }
    lifetimeBlocks++; lifetimeMins+=mins; lifetimeFocusPoints+=10; houseProgress++;
    // subject totals
    const subj=(b&&b.subject&&!b.isPause)?b.subject:T('phase_focus');
    subjectTotals[subj]=(subjectTotals[subj]||0)+mins;
    bumpStreakIfFirst();
    saveData();
    showReward(b,mins);
  } else if(curPhase==='pause-block'){
    // pause block timer ended
    const b=curB();
    if(b){ b.done=true; }
    saveData();
    advanceAfterBreak();
  } else {
    // break ended -> advance to next focus
    advanceAfterBreak();
  }
}

function bumpStreakIfFirst(){
  const t=studyDayStr();  // study-day boundary (4am) keeps streak consistent for late-night sessions
  if(lastDay!==t){
    if(lastDay && daysBetween(lastDay,t)===1) streak++;
    else streak=1;
    lastDay=t;
  } else if(streak===0){ streak=1; }
}

/* after reward: continue to break or next focus */
function continueFromReward(takeBreak){
  closeReward();
  // are all focus blocks done?
  const remaining=blocks.filter(b=>!b.done&&!b.skipped&&!b.isPause).length;
  if(remaining===0){
    finalizeDayHistory();
    showRecap();
    return;
  }
  // move to next undone block index
  const nextIdx=blocks.findIndex(b=>!b.done&&!b.skipped);
  if(takeBreak){
    // check if next block is a pause block — use it directly
    if(nextIdx>=0 && blocks[nextIdx] && blocks[nextIdx].isPause){
      curBlock=nextIdx; setPhase('focus',true); startTimer();
    } else {
      // long break every longAfter sessions, otherwise short
      const ph=(sessComp>0 && sessComp%S.longAfter===0)?'long':'short';
      curBlock=nextIdx>=0?nextIdx:curBlock; // upcoming block shown after the break
      setPhase(ph,true);
      startTimer();
    }
  } else {
    curBlock=nextIdx>=0?nextIdx:curBlock; setPhase('focus',true);
    renderApp();
  }
  saveData();
}
function advanceAfterBreak(){
  const nextIdx=blocks.findIndex(b=>!b.done&&!b.skipped);
  if(nextIdx<0){ finalizeDayHistory(); showRecap(); return; }
  curBlock=nextIdx; setPhase('focus',true);
  renderApp();
}

/* skip — does NOT count as done */
function skipPhase(){
  const wasRunning=running;
  if(wasRunning)pauseTimer();
  // pause blocks: skip immediately without confirm dialog
  if(curPhase==='pause-block'||(curPhase==='focus'&&curB()&&curB().isPause)){
    doSkipPauseBlock();
    return;
  }
  showConfirm('↷', T('skip_t'), T('skip_msg'),
    T('skip_continue'), T('skip_confirm'),
    ()=>{ doSkip(); },
    ()=>{ if(wasRunning)startTimer(); });
}
function doSkipPauseBlock(){
  stopTimer();
  const b=curB();
  if(b) b.done=true; // mark pause as done (skipped through)
  advanceAfterBreak();
  saveData(); renderApp();
}
function doSkip(){
  stopTimer();
  currentSessionMins=0;
  if(curPhase==='focus'){
    // skip this focus block: mark as skipped (NOT done, no counting), move to next undone
    const b=curB();
    if(b) b.skipped=true;
    const nextIdx=blocks.findIndex((bl,i)=>i>curBlock && !bl.done && !bl.skipped);
    if(nextIdx>=0){ curBlock=nextIdx; setPhase('focus',true); }
    else {
      // no more focus blocks ahead
      const anyDone=blocks.some(bl=>bl.done);
      if(anyDone){ finalizeDayHistory(); showRecap(); return; }
      setPhase('focus',true);
    }
  } else {
    advanceAfterBreak();
  }
  saveData(); renderApp();
}

/* WebAudio chime */
function playChime(reward){
  const mode = reward ? S.companionSound : S.sound;
  if(S.sound==='off' && (!reward)) return;
  if(reward && S.companionSound==='off' && S.sound==='off') return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    const ctx=audioCtx;
    const vol=(S.sound==='full')?0.18:0.09;
    const now=ctx.currentTime;
    const notes=[523.25,659.25,783.99];
    notes.forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type='sine';o.frequency.value=f;
      o.connect(g);g.connect(ctx.destination);
      const t=now+i*0.12;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(vol,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+0.5);
      o.start(t);o.stop(t+0.55);
    });
  }catch(e){}
}

  if(typeof document.createElement('div').animate!=='function')return;

  c.style.cssText='position:fixed;inset:0;pointer-events:none;z-index:300;overflow:hidden;';

    c.appendChild(p);

/* ── Touch drag (mobile) ───────────────────────────────────────
   Reusable touch-based drag for any list. Calls onReorder(fromIdx,toIdx).
   ────────────────────────────────────────────────────────────── */
function attachPointerDrag(host, getItems, getIdx, onReorder){
  let ghost=null, srcEl=null, fromIdx=null, lastDropIdx=null, ghostOffY=0;
  function calcDropIdx(y){
    const items=getItems();
    for(let i=0;i<items.length;i++){
      const r=items[i].getBoundingClientRect();
      if(y<r.top+r.height/2) return i;
    }
    return items.length;
  }
  function showDropLine(dropIdx){
    host.querySelectorAll('.bb-drop-line').forEach(l=>l.remove());
    const items=getItems();
    const line=document.createElement('div'); line.className='bb-drop-line';
    if(dropIdx>=items.length) host.appendChild(line);
    else items[dropIdx].before(line);
    lastDropIdx=dropIdx;
  }
  host.addEventListener('pointerdown',(e)=>{
    const handle=e.target.closest('.bb-drag-handle,.bi-drag');
    if(!handle) return;
    const item=handle.closest('.bb-card,.block-item');
    if(!item) return;
    e.preventDefault();
    srcEl=item; fromIdx=getIdx(item);
    const r=item.getBoundingClientRect();
    ghostOffY=e.clientY-r.top;
    ghost=item.cloneNode(true);
    ghost.classList.add('touch-drag-ghost');
    ghost.style.cssText+=`;position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;pointer-events:none;z-index:9999;`;
    document.body.appendChild(ghost);
    item.style.opacity='0.25';
    lastDropIdx=null;
    try{ host.setPointerCapture(e.pointerId); }catch(err){}
  },{passive:false});
  host.addEventListener('pointermove',(e)=>{
    if(fromIdx===null||!ghost) return;
    e.preventDefault();
    ghost.style.top=(e.clientY-ghostOffY)+'px';
    const drop=calcDropIdx(e.clientY);
    const eff=drop>fromIdx?drop-1:drop;
    if(eff!==fromIdx){ showDropLine(drop); }
    else{ host.querySelectorAll('.bb-drop-line').forEach(l=>l.remove()); lastDropIdx=null; }
  },{passive:false});
  function endDrag(){
    if(fromIdx===null) return;
    if(ghost){ghost.remove();ghost=null;}
    host.querySelectorAll('.bb-drop-line').forEach(l=>l.remove());
    getItems().forEach(el=>el.style.opacity='');
    if(srcEl) srcEl.style.opacity='';
    if(lastDropIdx!==null&&lastDropIdx!==fromIdx) onReorder(fromIdx,lastDropIdx);
    fromIdx=null; lastDropIdx=null; srcEl=null;
  }
  host.addEventListener('pointerup',endDrag);
  host.addEventListener('pointercancel',endDrag);
}

function renderBlocks(){
  const host=document.getElementById('blocksList'); if(!host)return;

    const dragHandle=`<div class="bi-drag" title="Slepen om te verplaatsen">⠿</div>`;
    const taskCount=b.tasks?b.tasks.length:0;
    const doneTasks=b.tasks?b.tasks.filter(t=>t.done).length:0;
    if(b.isPause){
      item.innerHTML=`
        <div class="bi-head">
          ${dragHandle}

    } else {
      const meta=`${b.mins} min${taskCount?` · ${doneTasks}/${taskCount} ✓`:''}${b.skipped?' · '+esc(T('skip')):''}`;
      item.innerHTML=`
        <div class="bi-head">
          ${dragHandle}
          <div class="bi-num">${b.done?'✓':focusIdx}</div>

          </div>
          ${blocks.length>1?`<button class="bi-del-quick" title="Verwijderen" aria-label="Verwijder blok">✕</button>`:''}
        </div>
        <div class="bi-edit" id="biEdit${i}">
          <div class="bb-subj-chips" id="biChips${i}">${subjects.map(s=>`<button type="button" class="bb-subj-chip${b.subject===s.name?' on':''}" data-name="${esc(s.name)}" style="--chip-col:${s.color}">${esc(s.name)}</button>`).join('')}<button type="button" class="bb-subj-chip bb-subj-new${(!subjects.some(s=>s.name===b.subject)&&b.subject)||b._editCustom?' on':''}">＋ Vak</button></div>
          ${(!subjects.some(s=>s.name===b.subject)&&b.subject)||b._editCustom?`<input class="bi-custom" placeholder="${esc(T('subj_ph'))}" value="${esc(b.subject)}">`:'<input class="bi-custom hidden" placeholder="'+esc(T('subj_ph'))+'">'}
          <div style="display:flex;gap:8px;align-items:center;"><span style="font-size:12px;color:var(--muted)">${esc(T('minutes'))}</span><input class="bi-mins" type="number" min="5" max="180" step="5" value="${b.mins}" style="width:80px;"></div>
          <textarea class="bi-note" placeholder="${esc(T('note_ph'))}">${esc(b.note||'')}</textarea>
          <div class="bi-tasklist" id="biTasks${i}"></div>
          <button class="bb-add-task bi-addtask">${esc(T('add_task'))}</button>
          <div style="display:flex;gap:8px;"><button class="ctrl-btn bi-save" style="flex:1;">${esc(T('save'))}</button></div>
        </div>`;
      item.querySelector('.bi-body').onclick=(e)=>{ if(e.target.closest('.bi-drag,.bi-del-quick')) return; toggleEdit(i); };
      if(blocks.length>1) item.querySelector('.bi-del-quick').onclick=(e)=>{ e.stopPropagation(); deleteBlock(i); };
      wireBlockEdit(item,b,i);
    }
    host.appendChild(item);
  });
  // smooth pointer drag (mouse + touch)
  attachPointerDrag(host,
    ()=>[...host.querySelectorAll('.block-item')],
    (el)=>parseInt(el.dataset.idx),
    (from,to)=>{
      const moved=blocks.splice(from,1)[0];
      const insertAt=to>from?to-1:to;
      blocks.splice(insertAt,0,moved);
      if(curBlock===from) curBlock=insertAt;
      else if(from<insertAt && curBlock>from && curBlock<=insertAt) curBlock--;
      else if(from>insertAt && curBlock<from && curBlock>=insertAt) curBlock++;
      saveData(); renderApp();
    }
  );
}
function wireBlockEdit(item,b,i){
  // subject chip picker (replaces old <select>)
  const chipsHost=item.querySelector('#biChips'+i);
  if(chipsHost){
    const custInp=item.querySelector('.bi-custom');
    chipsHost.querySelectorAll('.bb-subj-chip:not(.bb-subj-new)').forEach(chip=>{
      chip.onclick=()=>{
        b.subject=chip.dataset.name; b._editCustom=false;
        chipsHost.querySelectorAll('.bb-subj-chip').forEach(c=>c.classList.remove('on'));
        chip.classList.add('on');
        if(custInp){custInp.classList.add('hidden');custInp.value='';}
      };
    });
    const newChip=chipsHost.querySelector('.bb-subj-new');
    if(newChip&&custInp){
      newChip.onclick=()=>{
        chipsHost.querySelectorAll('.bb-subj-chip').forEach(c=>c.classList.remove('on'));
        newChip.classList.add('on');
        custInp.classList.remove('hidden');
        b._editCustom=true; b.subject='';
        setTimeout(()=>custInp.focus(),30);
      };
    }
    if(custInp){ custInp.oninput=()=>{ b.subject=custInp.value; }; custInp.onkeydown=(e)=>{ if(e.key==='Enter'){e.preventDefault();custInp.blur();} }; }
  }
  item.querySelector('.bi-mins').oninput=(e)=>{ b.mins=Math.max(5,Math.min(180,+e.target.value||5)); if(i===curBlock&&!running&&curPhase==='focus'){setPhase('focus',true);} };
  item.querySelector('.bi-note').oninput=(e)=>{ b.note=e.target.value; };
  // tasks
  const tl=item.querySelector('#biTasks'+i);
  if(!b.tasks)b.tasks=[];
  b.tasks.forEach((t,ti)=>{
    const row=document.createElement('div'); row.className='bi-task'+(t.done?' checked':'');
    row.innerHTML=`<input type="checkbox" ${t.done?'checked':''}><input class="bi-tedit" value="${esc(t.text||'')}" placeholder="${esc(T('task_ph'))}" style="flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-size:12px;outline:none;"><button class="bb-x" style="width:22px;">✕</button>`;
    row.querySelector('input[type=checkbox]').onchange=(e)=>{t.done=e.target.checked;row.classList.toggle('checked',t.done);saveData();renderDayBar();};
    row.querySelector('.bi-tedit').oninput=(e)=>{t.text=e.target.value;};
    row.querySelector('.bb-x').onclick=()=>{b.tasks.splice(ti,1);renderBlocks();openEdit(i);};
    tl.appendChild(row);
  });
  item.querySelector('.bi-addtask').onclick=()=>{ b.tasks.push({text:'',done:false}); renderBlocks(); openEdit(i); };
  item.querySelector('.bi-save').onclick=()=>{ if(b.subject)addSubject(b.subject); editingBlock=null; saveData(); renderApp(); };
  if(editingBlock===i){ const ed=item.querySelector('#biEdit'+i); if(ed)ed.classList.add('open'); }
}
function toggleEdit(i){ editingBlock=(editingBlock===i)?null:i; renderBlocks(); }
function openEdit(i){ editingBlock=i; const ed=document.getElementById('biEdit'+i); if(ed)ed.classList.add('open'); }
function moveBlock(i,dir){
  const j=i+dir; if(j<0||j>=blocks.length)return;
  [blocks[i],blocks[j]]=[blocks[j],blocks[i]];
  // keep curBlock pointing at the right active block
  if(curBlock===i)curBlock=j; else if(curBlock===j)curBlock=i;
  saveData(); renderApp();
}
function addQuickBlock(mins){
  blocks.push({id:nid++,subject:'',mins,note:'',tasks:[],done:false,status:null});
  checkPauseSuggestion();
  saveData(); renderApp();
}
function addQuickPause(){
  blocks.push({id:nid++,isPause:true,mins:15,note:'',tasks:[],done:false});
  saveData(); renderApp();
}
function checkPauseSuggestion(){
  // count consecutive focus blocks without a pause at the end
  let streak=0;
  for(let i=blocks.length-1;i>=0;i--){
    if(blocks[i].isPause) break;
    streak++;
  }
  if(streak>0 && streak%3===0){
    const b=document.createElement('div');
    b.className='pause-suggest';
    b.innerHTML=`<span>💡 ${streak} blokken zonder pauze — pauze inlassen?</span><button onclick="addQuickPause();this.closest('.pause-suggest').remove()">＋ Pauze</button><button onclick="this.closest('.pause-suggest').remove()">✕</button>`;
    const host=document.getElementById('blocksList');
    if(host){ host.before(b); setTimeout(()=>b.remove&&b.isConnected&&b.remove(),8000); }
  }
}

function renderWeekChart(){
  const days=[]; const today=new Date();
  // include today's live mins
  const todayMins=completedMins;
  for(let i=6;i>=0;i--){
    const d=new Date(today); d.setDate(today.getDate()-i);
    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    let mins=0;
    const h=history.find(x=>x.date===ds); if(h)mins=h.mins;
    if(ds===todayStr())mins=Math.max(mins,todayMins);
    days.push({d,mins,lbl:d.toLocaleDateString(S.lang==='en'?undefined:S.lang,{weekday:'short'}).slice(0,2)});
  }
  const max=Math.max(60,...days.map(d=>d.mins));
  const bars=days.map(d=>{
    const h=Math.round((d.mins/max)*100);
    return `<div class="wc-day"><div class="wc-val">${d.mins?fmtDur(d.mins):''}</div><div class="wc-bar-wrap"><div class="wc-bar" data-h="${h}" style="height:0%"></div></div><div class="wc-lbl">${esc(d.lbl)}</div></div>`;
  }).join('');
  return `<div class="prog-section"><div class="prog-sec-t">${esc(T('prog_week'))}</div><div class="week-chart">${bars}</div></div>`;
}
function renderSubjStats(){
  // merge: all known subjects + any in subjectTotals not in subjects list
  const allNames=new Set([
    ...subjects.map(s=>s.name),
    ...Object.keys(subjectTotals).filter(k=>k!=='__pause__'&&k!==T('phase_focus'))
  ]);
  const entries=[...allNames].map(name=>([name, subjectTotals[name]||0])).sort((a,b)=>b[1]-a[1]);
  const totalMins=entries.reduce((s,[,m])=>s+m,0);
  const max=Math.max(...entries.map(e=>e[1]),1);
  const inner=entries.map(([name,mins])=>{
    const w=Math.round((mins/max)*100);
    const col=colorFor(name);
    const pct=totalMins>0?Math.round((mins/totalMins)*100):0;
    const isEmpty=mins===0;
    return `<div class="ss-row">
      <div class="ss-top">
        <div class="ss-name"><span class="ss-dot" style="background:${col}"></span>${esc(name)}</div>

      <div class="ss-track"><div class="ss-fill" data-w="${w}" style="width:0%;background:${col};${isEmpty?'opacity:.25':''}"></div></div>
    </div>`;
  }).join('');
  const summary=totalMins>0?`<div class="ss-total">Totaal: <strong>${fmtDur(totalMins)}</strong> focus</div>`:'';
  return `<div class="prog-section"><div class="prog-sec-t">${esc(T('prog_subjects'))}</div><div class="subj-stats">${inner}${summary}</div></div>`;
}

function markDirty(){ _dirty=true; updateSaveBtn(); }
function updateSaveBtn(){
  const sv=document.getElementById('setSaveBtn');
  const cn=document.getElementById('setCancelBtn');
  if(sv){ sv.textContent=T('save'); sv.disabled=!_dirty; }
  if(cn){ cn.textContent=T('cancel'); }
}
function saveSettings(){
  // _t already previewed live into S via applyLive; just persist + confirm
  Object.assign(S,_t);
  applyBodyClass(); applyAnimLevel();
  if(blocks.length && !running){ totalTime=phaseDur(curPhase); timeLeft=totalTime; }
  saveData();
  _orig=JSON.parse(JSON.stringify(S));
  _dirty=false;
  if(blocks.length)renderApp();
  closeSettings();
  banner(T('settings_saved'));
}
function cancelSettings(){
  if(_dirty && _orig){
    // revert everything to the snapshot
    Object.assign(S,_orig);
    applyBodyClass(); applyAnimLevel(); applyLang();
    if(blocks.length){ if(!running){totalTime=phaseDur(curPhase);timeLeft=totalTime;} renderApp(); }
  }
  _dirty=false;
  closeSettings();
}
function closeSettings(){ document.getElementById('settingsOv').classList.remove('open'); }
function renderSettings(){
  document.getElementById('setTitle').textContent=T('set_title');
  updateSaveBtn();
  const tabs=[['timer','tab_timer'],['appear','tab_appear'],['comp','tab_comp'],['subjects','tab_subjects'],['lang','tab_lang'],['data','tab_data']];
  const tb=document.getElementById('setTabs');
  tb.innerHTML=tabs.map(([id,k])=>`<button class="set-tab${setTab===id?' on':''}" data-t="${id}">${esc(T(k))}</button>`).join('');
  tb.querySelectorAll('.set-tab').forEach(b=>b.onclick=()=>{setTab=b.dataset.t;renderSettings();});
  const body=document.getElementById('setBody');
  if(setTab==='timer')body.innerHTML=paneTimer();
  else if(setTab==='appear')body.innerHTML=paneAppear();
  else if(setTab==='comp')body.innerHTML=paneComp();
  else if(setTab==='subjects')body.innerHTML=paneSubjects();
  else if(setTab==='lang')body.innerHTML=paneLang();
  else if(setTab==='data')body.innerHTML=paneData();
  wireSettings();
}
function rowStepper(id,lbl,sub,val,min,max,step){
  return `<div class="set-row"><div class="set-row-info"><div class="set-row-lbl">${esc(lbl)}</div><div class="set-row-sub">${esc(sub)}</div></div><div class="stepper" data-step="${id}" data-min="${min}" data-max="${max}" data-st="${step}"><button class="step-btn" data-d="-1">−</button><div class="step-val" id="sv_${id}">${val}</div><button class="step-btn" data-d="1">+</button></div></div>`;
}
function rowToggle(id,lbl,sub,on){
  return `<div class="set-row"><div class="set-row-info"><div class="set-row-lbl">${esc(lbl)}</div><div class="set-row-sub">${esc(sub)}</div></div><div class="toggle${on?' on':''}" data-toggle="${id}"></div></div>`;
}
function rowSeg(id,lbl,sub,opts,val){
  const segs=opts.map(([v,l])=>`<button class="seg-btn${val===v?' on':''}" data-v="${v}">${esc(l)}</button>`).join('');
  return `<div class="set-row" style="flex-wrap:wrap;"><div class="set-row-info"><div class="set-row-lbl">${esc(lbl)}</div><div class="set-row-sub">${esc(sub)}</div></div><div class="seg" data-seg="${id}">${segs}</div></div>`;
}

    ${rowSeg('companionSound',T('set_comp_sound_l'),'',[['off',T('csound_off')],['soft',T('csound_soft')],['reward',T('csound_reward')]],_t.companionSound)}`}

function paneSubjects(){
  return `<div class="set-pane on">
    <div class="set-row" style="flex-direction:column;align-items:stretch;gap:14px;">
      <div class="set-row-info"><div class="set-row-lbl">${esc(T('set_subj_l'))}</div><div class="set-row-sub">${esc(T('set_subj_s'))}</div></div>
      <div class="subj-mgr">
        <div class="subj-add-row"><input class="txt-input" id="settSubjInp" placeholder="${esc(T('subj_ph'))}" maxlength="22" autocomplete="off"><button class="subj-add-btn" id="settSubjAdd">+</button></div>
        <div class="subj-chips" id="settSubjChips"></div>
      </div>
    </div>
  </div>`;
}
function drawSettSubjChips(){
  const host=document.getElementById('settSubjChips'); if(!host)return;
  if(!subjects.length){host.innerHTML=`<div class="subj-empty">${esc(T('no_subjects'))}</div>`;return;}
  host.innerHTML=subjects.map((s,i)=>`<span class="subj-chip" data-i="${i}"><span class="sc-dot" style="background:${s.color}"></span><span class="sc-name" data-i="${i}" style="cursor:pointer;border-bottom:1px dashed var(--border);padding-bottom:1px;" title="${esc(T('subj_rename_tip'))}">${esc(s.name)}</span><button class="sc-x" data-i="${i}">✕</button></span>`).join('');
  // delete
  host.querySelectorAll('.sc-x').forEach(b=>b.onclick=()=>{subjects.splice(+b.dataset.i,1);saveData();drawSettSubjChips();});
  // inline rename on click
  host.querySelectorAll('.sc-name').forEach(span=>span.onclick=()=>{
    const i=+span.dataset.i;
    const inp=document.createElement('input');
    inp.style.cssText='font-size:13px;padding:3px 7px;border-radius:6px;border:1.5px solid var(--accent);background:var(--bg3);color:var(--text);outline:none;max-width:120px;font-family:var(--ff);';
    inp.value=subjects[i].name; inp.maxLength=22;
    span.replaceWith(inp); inp.focus(); inp.select();
    const commit=()=>{
      const v=inp.value.trim();
      if(v&&v!==subjects[i].name){
        const old=subjects[i].name;
        if(subjectTotals[old]!==undefined){subjectTotals[v]=(subjectTotals[v]||0)+subjectTotals[old];delete subjectTotals[old];}
        blocks.forEach(b=>{if(b.subject===old)b.subject=v;});
        subjects[i].name=v; subjects[i].color=colorFor(v);
        saveData();
      }
      drawSettSubjChips();
    };
    inp.onblur=commit;
    inp.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();inp.blur();}if(e.key==='Escape'){inp.value=subjects[i].name;inp.blur();}};
  });
}
function paneData(){
  return `<div class="set-pane on">
    <div class="set-row"><div class="set-row-info"><div class="set-row-lbl">${esc(T('set_data_export'))}</div><div class="set-row-sub">${esc(T('set_data_export_s'))}</div></div><button class="ctrl-btn" id="dataExport">${esc(T('export_btn'))}</button></div>
    <div class="set-row"><div class="set-row-info"><div class="set-row-lbl">${esc(T('set_data_import'))}</div><div class="set-row-sub">${esc(T('set_data_import_s'))}</div></div><button class="ctrl-btn" id="dataImport">${esc(T('import_btn'))}</button></div>
    <input type="file" id="importFile" accept="application/json,.json" style="display:none;">
    <div class="set-row"><div class="set-row-info"><div class="set-row-lbl" style="color:#f87171;">${esc(T('set_data_reset'))}</div><div class="set-row-sub">${esc(T('set_data_reset_s'))}</div></div><button class="ctrl-btn" id="dataReset" style="border-color:#f87171;color:#f87171;">${esc(T('reset_btn'))}</button></div>
    <div class="privacy-note" style="margin-top:1.2rem;">${esc(T('set_privacy'))}</div>
  </div>`;

function wireSettings(){
  const body=document.getElementById('setBody');
  // steppers
  body.querySelectorAll('[data-step]').forEach(st=>{
    const id=st.dataset.step,min=+st.dataset.min,max=+st.dataset.max,step=+st.dataset.st;
    st.querySelectorAll('.step-btn').forEach(b=>b.onclick=()=>{
      let v=_t[id]+(+b.dataset.d)*step; v=Math.max(min,Math.min(max,v));
      _t[id]=v; document.getElementById('sv_'+id).textContent=v; applyLive();
    });
  });
  // toggles
  body.querySelectorAll('[data-toggle]').forEach(t=>t.onclick=()=>{
    const id=t.dataset.toggle; _t[id]=!_t[id]; t.classList.toggle('on',_t[id]); applyLive();
  });
  // segments
  body.querySelectorAll('[data-seg]').forEach(sg=>{
    const id=sg.dataset.seg;
    sg.querySelectorAll('.seg-btn').forEach(b=>b.onclick=()=>{
      _t[id]=b.dataset.v;
      sg.querySelectorAll('.seg-btn').forEach(x=>x.classList.toggle('on',x===b));
      applyLive();
      if(id==='companionVis')renderSettings();
    });
  });
  // theme cards
  body.querySelectorAll('[data-theme]').forEach(c=>c.onclick=()=>{
    _t.theme=c.dataset.theme;
    body.querySelectorAll('[data-theme]').forEach(x=>x.classList.toggle('on',x===c));
    applyLive();
  });
  // companion cards
  body.querySelectorAll('[data-comp]').forEach(c=>c.onclick=()=>{
    _t.companion=c.dataset.comp; renderSettings(); applyLive();
  });
  // companion name
  const cn=body.querySelector('#compName'); if(cn)cn.oninput=()=>{_t.companionName=cn.value;applyLive();};
  // lang
  body.querySelectorAll('[data-lang]').forEach(b=>b.onclick=()=>{
    _t.lang=b.dataset.lang; S.lang=b.dataset.lang; markDirty(); applyLang();
    document.getElementById('setTitle').textContent=T('set_title');
    renderSettings();
  });
  // bg photo
  const up=body.querySelector('#bgUpload'), file=body.querySelector('#bgFile');
  if(up)up.onclick=()=>file.click();
  if(file)file.onchange=(e)=>{
    const f=e.target.files[0]; if(!f)return;
    const rd=new FileReader();
    rd.onload=()=>{ resizePhoto(rd.result,(data)=>{ _t.bgPhoto=data; applyLive(); renderSettings(); }); };
    rd.readAsDataURL(f);
  };
  const clr=body.querySelector('#bgClear'); if(clr)clr.onclick=()=>{_t.bgPhoto='';applyLive();renderSettings();};
  // subjects pane
  const sai=body.querySelector('#settSubjAdd'), siin=body.querySelector('#settSubjInp');
  if(sai&&siin){
    drawSettSubjChips();
    const addSettSubj=()=>{const v=siin.value.trim();if(v){addSubject(v);siin.value='';saveData();drawSettSubjChips();}siin.focus();};
    sai.onclick=addSettSubj;
    siin.onkeydown=(e)=>{if(e.key==='Enter'){e.preventDefault();addSettSubj();}};
  }
  // data
  const ex=body.querySelector('#dataExport'); if(ex)ex.onclick=exportData;
  const im=body.querySelector('#dataImport'), imf=body.querySelector('#importFile');
  if(im)im.onclick=()=>imf.click();
  if(imf)imf.onchange=(e)=>{const f=e.target.files[0];if(f)importData(f);};
  const rs=body.querySelector('#dataReset'); if(rs)rs.onclick=askReset;
}
/* apply settings draft live */
function applyLive(){
  Object.assign(S,_t);
  applyBodyClass(); applyAnimLevel();
  markDirty();
  if(blocks.length){
    // recompute current phase duration if timer not running
    if(!running){ totalTime=phaseDur(curPhase); timeLeft=totalTime; }
    renderApp();
  }
}
/* downscale uploaded photo to keep storage small */
function resizePhoto(dataUrl,cb){
  const img=new Image();
  img.onload=()=>{
    const max=1280; let{width:w,height:h}=img;
    if(w>max||h>max){ const r=Math.min(max/w,max/h); w=Math.round(w*r); h=Math.round(h*r); }
    const cv=document.createElement('canvas'); cv.width=w;cv.height=h;
    cv.getContext('2d').drawImage(img,0,0,w,h);
    cb(cv.toDataURL('image/jpeg',0.82));
  };
  img.onerror=()=>cb(dataUrl);
  img.src=dataUrl;
}

/* ====================== DATA EXPORT / IMPORT / RESET ====================== */
function exportData(){
  const data=buildPayload();
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download='focusblock-backup-'+todayStr()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
  banner(T('set_data_export'));
}
function importData(file){
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d||(d.v!==2&&!d.onboarded&&!d.name&&!d.history)) throw new Error('bad');
      applyLoaded(d); saveData();
      applyLang(); applyBodyClass(); applyAnimLevel();
      closeSettings();
      goHome();
      banner(T('set_data_import'));
    }catch(e){ banner(T('invalid_backup')); }
  };
  rd.readAsText(file);
}
function askReset(){
  showConfirm('⚠', T('reset_t'), T('reset_msg'), T('reset_cancel'), T('reset_confirm'),
    ()=>{ doReset(); });
}
function doReset(){
  try{ localStorage.removeItem(LS_KEY); }catch(e){}
  idbSet(null);
  location.reload();
}

/* ====================== LANGUAGE (live) ====================== */
function applyLang(){
  document.documentElement.lang=S.lang;
  // re-render whatever screen is visible
  if(document.getElementById('home').style.display!=='none') renderHome();
  if(document.getElementById('flow').style.display!=='none' && flowSteps.length) renderFlowStep();
  if(document.getElementById('app').style.display!=='none' && blocks.length) renderApp();
  if(document.getElementById('progress').style.display!=='none') renderProgress();
  if(document.getElementById('settingsOv').classList.contains('open')) renderSettings();
}

/* ====================== LOAD / SAVE STATE ====================== */
function applyLoaded(d){
  if(!d)return;
  onboarded=!!d.onboarded;
  userName=d.name||'';
  subjects=Array.isArray(d.subjects)?d.subjects:[];
  lastPlan=d.lastPlan||null;
  S.focus=d.focus??S.focus; S.short=d.short??S.short; S.long=d.long??S.long; S.longAfter=d.longAfter??S.longAfter;
  S.theme=d.theme||S.theme; S.light=!!d.light; S.sound=d.sound||S.sound;
  S.tips=d.tips!==undefined?d.tips:S.tips; S.lang=d.lang||S.lang;
  S.bgPhoto=d.bgPhoto||''; S.ambient=d.ambient||'none'; S.timerLayout=d.timerLayout||'ring'; S.animLevel=d.animLevel||'balanced';
  S.companion=d.companion||S.companion; S.companionName=d.companionName||''; S.companionVis=d.companionVis||'focus';
  S.companionTone=d.companionTone||'friendly'; S.companionSound=d.companionSound||'off';
  streak=d.streak||0; lastDay=d.lastDay||null;
  lifetimeBlocks=d.lifetimeBlocks||0; lifetimeMins=d.lifetimeMins||0; lifetimeFocusPoints=d.lifetimeFocusPoints||0; houseProgress=d.houseProgress||0;
  history=Array.isArray(d.history)?d.history:[];
  subjectTotals=d.subjectTotals||{};
  // restore active day — uses studyDayStr (4am boundary) so sessions past midnight still restore
  if(d.activeDay && d.activeDay.date===studyDayStr() && Array.isArray(d.activeDay.blocks) && d.activeDay.blocks.length){
    const a=d.activeDay;
    blocks=a.blocks; curBlock=a.curBlock||0; curPhase=a.curPhase||'focus';
    totalTime=a.totalTime||phaseDur(curPhase);
    // if a real endTimestamp was saved (timer was running when page closed), recalculate timeLeft from wall clock
    if(a.endTimestamp && a.endTimestamp > Date.now()){
      endTimestamp=a.endTimestamp;
      timeLeft=Math.max(0,Math.round((endTimestamp-Date.now())/1000));
    } else {
      timeLeft=a.timeLeft??totalTime;
    }
    sessComp=a.sessComp||0; completedMins=a.completedMins||0; currentSessionMins=a.currentSessionMins||0;
    dayCounted=a.dayCounted||false; running=false;
    // re-id blocks to keep nid unique
    blocks.forEach(b=>{ b.id=nid++; });
    _restoredDay=true;
  }
}

function finalizeDayHistory(){
  const t=studyDayStr();  // use study-day (4am boundary) so post-midnight sessions land on the right date
  const doneBlocks=blocks.filter(b=>b.done&&!b.isPause);
  if(!doneBlocks.length)return;
  const subjMap={};
  doneBlocks.forEach(b=>{ const s=b.subject||T('phase_focus'); subjMap[s]=(subjMap[s]||0)+b.mins; });
  let h=history.find(x=>x.date===t);
  if(h){ h.blocks=doneBlocks.length; h.mins=completedMins; h.subjects=subjMap; }
  else history.push({date:t,blocks:doneBlocks.length,mins:completedMins,subjects:subjMap});
  // clear active day so it doesn't restore tomorrow
  blocks=[]; lastPlan=lastPlan; // keep lastPlan
  saveData();
}

/* ====================== INIT ====================== */
let _restoredDay=false;
async function init(){
  // detect default language from browser if first run
  let local=loadLocal();
  if(!local){
    const idbData=await idbGet();
    if(idbData)local=idbData;
  }
  if(local){ applyLoaded(local); }
  else {
    const nav=(navigator.language||'en').slice(0,2);
    if(LANGS.some(l=>l.id===nav))S.lang=nav;
  }
  applyBodyClass(); applyAnimLevel(); applyLang();
  // wire global handlers
  window.addEventListener('resize',()=>{ if(document.getElementById('app').style.display!=='none')sizeRing(); });
  document.addEventListener('visibilitychange',()=>{
    if(!document.hidden && running){
      // recalculate from wall-clock in case browser throttled the interval
      timeLeft=Math.max(0,Math.round((endTimestamp-Date.now())/1000));
      // reset interval so it's back to normal cadence
      if(iv){clearInterval(iv);iv=null;}
      iv=setInterval(tick,250);
      drawRing(); updateTimeText();
      if(timeLeft<=0)phaseComplete();
    }
  });
  window.addEventListener('beforeunload',(e)=>{
    if(running){ e.preventDefault(); e.returnValue=T('leave_warn'); return T('leave_warn'); }
  });
  // routing
  if(!onboarded){ startOnboard(); }
  else if(_restoredDay && blocks.length){ goApp(); banner(Tf('sess_of',{a:Math.min(curBlock+1,blocks.length),b:blocks.length})); }
  else { goHome(); }
}
// kick off
init();

// offline support via service worker
if('serviceWorker' in navigator){
  try{
    const swCode=`const CACHE='focusblock-v2';
self.addEventListener('install',e=>{self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{
  if(e.request.method!=='GET')return;
  e.respondWith(caches.open(CACHE).then(cache=>
    fetch(e.request).then(res=>{cache.put(e.request,res.clone());return res;}).catch(()=>cache.match(e.request))
  ));
});`;
    const blob=new Blob([swCode],{type:'application/javascript'});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }catch(e){}
}
